<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮游戏宝库🎮</title>
    <!-- 预连接加速 -->
    <link rel="preconnect" href="https://www.steamck.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <style>
        /* ========== 全局防模糊优化（明亮风格） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            background-image: url('https://images.igdb.com/igdb/image/upload/t_1080p/scojg8.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #1a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-touch-callout: none;
            user-select: none;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }
        .query-card {
            width: 100%;
            max-width: 950px;
            background: transparent;
            border: 1px solid rgba(160, 200, 240, 0.4);
            border-radius: 2.5rem;
            padding: 2.2rem 2rem 1.8rem 2rem;
            box-shadow: 0 25px 40px -20px rgba(30, 60, 90, 0.3), 0 10px 20px -5px rgba(140, 200, 255, 0.2), inset 0 1px 3px #ffffffcc;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            z-index: 1;
            backface-visibility: hidden;
            transform: scale(1);
        }
        .query-card:hover {
            transform: scale(1.005);
            border-color: rgba(80, 160, 240, 0.7);
            box-shadow: 0 30px 45px -15px #2b4f6e40, 0 0 0 2px rgba(100, 180, 255, 0.2);
        }
        .query-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 250, 255, 0.92);
            border-radius: inherit;
            z-index: -1;
            pointer-events: none;
            transition: background 0.2s;
        }
        .query-card:hover::before {
            background: rgba(245, 250, 255, 0.96);
        }
        .query-card > * {
            position: relative;
            z-index: 1;
        }
        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .game-house {
            font-size: 1.95rem;
            font-weight: 800;
            background: linear-gradient(130deg, #1f6d8f, #1b5b7a, #134b66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px rgba(70, 160, 220, 0.3);
            line-height: 1.2;
        }
        .header-right {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: nowrap;
        }
        .publisher-line {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.1rem;
            margin-bottom: 1.8rem;
            color: #2f5570;
            font-size: 1rem;
            border-left: 3px solid #3f9ad0;
            padding-left: 1rem;
        }
        .publisher-icon {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 3px #6bb0e6);
        }
        .publisher-name {
            font-weight: 600;
            color: #1e4863;
        }
        .search-hint {
            color: #215674;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            padding: 0.3rem 0 0.2rem 0;
            border-bottom: 1px dashed rgba(70, 140, 210, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .hint-bold {
            font-weight: 600;
            color: #1b6c9c;
        }
        .input-wrapper {
            position: relative;
            width: 100%;
            margin: 0.5rem 0 1rem 0;
        }
        .game-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #b3d6f0;
            border-radius: 60px;
            padding: 1.1rem 1.8rem;
            font-size: 1.2rem;
            color: #103f5c;
            caret-color: #2b8dcc;
            outline: none;
            transition: all 0.25s;
            box-shadow: inset 0 4px 8px rgba(0, 20, 40, 0.02), 0 2px 4px #c9e2ff;
            font-weight: 500;
        }
        .game-input::placeholder {
            color: #7096b5;
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.8;
        }
        .game-input:focus {
            border-color: #3895d6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(70, 160, 255, 0.25), inset 0 2px 5px #d9ecff;
        }
        .input-emoji-decoration {
            position: absolute;
            right: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 1.3rem;
            color: #4797cf;
            opacity: 0.6;
        }
        .query-btn {
            background: linear-gradient(115deg, #4797cf, #2d7eb3);
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1rem;
            width: 100%;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 1px 3px #0a2b40;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px -6px #236a99, 0 2px 4px #b1d6ff;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-top: 1.5rem;
        }
        .query-btn:hover {
            background: linear-gradient(115deg, #57a8e0, #388ac7);
            box-shadow: 0 14px 25px -5px #1e6fa3, 0 3px 8px #9cc9ff;
            transform: translateY(-2px);
        }
        .query-btn:active {
            transform: translateY(1px);
        }
        .demo-hint {
            margin-top: 1rem;
            color: #2b5b7e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            padding-top: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .mock-link {
            color: #195477;
            background: rgba(170, 215, 255, 0.6);
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            border: 1px solid rgba(70, 150, 230, 0.5);
            font-size: 0.8rem;
            transition: all 0.1s;
            font-weight: 500;
            cursor: pointer;
        }
        .mock-link:hover {
            background: rgba(120, 190, 255, 0.7);
            border-color: #277bb5;
            color: #083952;
            transform: translateY(-1px);
        }
        .tool-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: space-between;
            margin: 0.5rem 0 1.2rem 0;
            width: 100%;
        }
        .tool-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid #6ba6d9;
            border-radius: 40px;
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #134b66;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0, 30, 60, 0.1);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
            flex: 1 1 auto;
            min-width: 140px;
            justify-content: center;
        }
        .tool-btn:hover {
            background: rgba(100, 170, 240, 0.4);
            border-color: #4797cf;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(30, 100, 160, 0.2);
        }
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(100, 170, 240, 0.3);
            border-radius: 50%;
            border-top-color: #4797cf;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        hr {
            border: 0.5px solid rgba(80, 150, 220, 0.3);
            margin: 0.6rem 0;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #6589a8;
            margin-top: 0.2rem;
            line-height: 1.3;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(20, 40, 60, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: rgba(245, 250, 255, 0.98);
            backdrop-filter: blur(8px);
            width: 90%;
            max-width: 950px;
            max-height: 85vh;
            border-radius: 2.5rem;
            border: 1px solid rgba(100, 180, 255, 0.5);
            box-shadow: 0 30px 50px rgba(0, 30, 60, 0.4);
            padding: 2rem 2rem;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        .modal-overlay.show .modal-container {
            transform: scale(1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(70, 150, 230, 0.3);
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #134b66;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .result-count {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff6a1a;
            background: rgba(255, 106, 26, 0.15);
            padding: 0.1rem 0.4rem;
            border-radius: 30px;
            margin-left: 0.2rem;
        }
        .modal-close {
            background: rgba(200, 225, 255, 0.5);
            border: 1px solid #7bb0d9;
            color: #1f5f83;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover {
            background: rgba(100, 170, 240, 0.5);
            color: #083952;
            transform: rotate(90deg);
        }
        .modal-body {
            overflow-y: auto;
            padding: 0.5rem 0.5rem 1.2rem 0.5rem;
            max-height: 55vh;
            scrollbar-width: thin;
        }
        .modal-game-card {
            background: white;
            border-radius: 1.8rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(70, 150, 230, 0.3);
            box-shadow: 0 4px 12px rgba(0, 30, 50, 0.05);
            transition: box-shadow 0.1s;
        }
        .modal-game-card:hover {
            border-color: #4797cf;
            box-shadow: 0 6px 14px rgba(30, 100, 160, 0.1);
        }
        .game-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .modal-qr-group {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        .modal-qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            cursor: pointer;
            transition: transform 0.1s;
            background: rgba(245, 250, 255, 0.6);
            padding: 0.2rem 0.4rem;
            border-radius: 1rem;
            min-width: 55px;
        }
        .modal-qr-item:hover {
            transform: scale(1.02);
            background: rgba(200, 225, 255, 0.8);
        }
        .qr-code-box {
            width: 55px;
            height: 55px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(60, 140, 210, 0.4);
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .qr-code-box canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
        .qr-label {
            font-size: 0.7rem;
            color: #1b5b7a;
            background: rgba(100, 170, 240, 0.1);
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-weight: 500;
        }
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(70, 150, 230, 0.2);
        }
        .page-btn {
            background: rgba(170, 215, 255, 0.7);
            border: 1px solid #6ba6d9;
            color: #1a5777;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: #4797cf;
            color: white;
            border-color: #2d7eb3;
            transform: translateY(-1px);
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #b0cbe5;
        }
        .page-info {
            color: #1f5f83;
            font-size: 0.8rem;
            min-width: 140px;
            text-align: center;
            font-weight: 500;
            background: rgba(255,255,255,0.4);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }
        .empty-modal-msg {
            text-align: center;
            padding: 2.5rem;
            color: #6589a8;
            font-size: 1.1rem;
            background: rgba(220, 240, 255, 0.5);
            border-radius: 2.5rem;
        }
        .tool-content {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(70, 150, 230, 0.3);
        }
        .tool-content h3 {
            color: #134b66;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            border-bottom: 2px solid rgba(70, 150, 230, 0.2);
            padding-bottom: 0.4rem;
        }
        .tool-content p {
            color: #1f5f83;
            font-size: 1rem;
            line-height: 1.5;
        }
        .hot-section {
            margin: 1rem 0 0.5rem;
        }
        .hot-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a5777;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .hot-title::before {
            content: "🔥";
            font-size: 1.2rem;
        }
        .hot-scroll {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }
        .hot-item {
            flex: 0 0 auto;
            width: 80px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .hot-item:hover {
            transform: translateY(-2px);
        }
        .hot-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 16px;
            background: #f0f0f0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            image-rendering: auto;
        }
        .hot-item span {
            display: block;
            font-size: 0.75rem;
            margin-top: 0.3rem;
            color: #1a5777;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .Dict { display: none; }
        .pc { font-size: 0.7rem; color: #2b8dcc; margin-top: 0.2rem; }
        @media (hover: none) and (pointer: coarse), (max-width: 768px) {
            .Dict { display: inline-block; }
            .pc { display: none; }
        }
        .zoom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 40, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s ease;
        }
        .zoom-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .zoom-modal-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.8rem 1.8rem 1.5rem 1.8rem;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 35px 60px rgba(0, 25, 50, 0.6);
            border: 1px solid rgba(100, 180, 255, 0.6);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s;
            position: relative;
        }
        .zoom-modal-overlay.show .zoom-modal-container {
            transform: scale(1);
        }
        .zoom-close {
            position: absolute;
            top: 0.8rem;
            right: 1.2rem;
            font-size: 1rem;
            color: #2b5f88;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(200,225,255,0.7);
            transition: 0.2s;
            border: 1px solid #a0c8e8;
        }
        .zoom-close:hover {
            background: #4797cf;
            color: white;
            transform: rotate(90deg);
        }
        .zoom-qr-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0 1rem 0;
        }
        .zoom-qr-box {
            width: 240px;
            height: 240px;
            background: white;
            border: 3px solid rgba(60, 140, 210, 0.4);
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(0, 40, 70, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .zoom-qr-box canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
        .zoom-platform {
            font-size: 1.2rem;
            font-weight: 600;
            color: #134b66;
            margin-top: 0.2rem;
            background: rgba(100, 170, 240, 0.1);
            padding: 0.3rem 1.8rem;
            border-radius: 40px;
            display: inline-block;
        }
        .zoom-link-hint {
            font-size: 0.75rem;
            color: #6589a8;
            margin-top: 0.5rem;
            word-break: break-all;
            max-width: 260px;
        }
        .download-tip {
            font-size: 0.8rem;
            color: #2b8dcc;
            margin-top: 0.1rem;
            opacity: 0.8;
            background: rgba(200,230,255,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .wish-list { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1rem; }
        .wish-item { background: rgba(255,255,255,0.8); border-radius: 2rem; padding: 1rem 1.5rem; border: 1px solid #b3d6f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .wish-text { font-size: 1rem; color: #134b66; flex: 1; }
        .wish-time { font-size: 0.8rem; color: #6589a8; margin-left: 1rem; }
        .wish-reply { margin-top: 0.3rem; font-size: 0.85rem; color: #236a99; border-left: 3px solid #9ac9f0; padding-left: 0.8rem; }
        .wish-form { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; background: rgba(200,225,255,0.3); padding: 1.5rem; border-radius: 2rem; border: 1px dashed #6ba6d9; }
        .wish-input { flex: 3; min-width: 200px; background: white; border: 2px solid #b3d6f0; border-radius: 40px; padding: 0.8rem 1.5rem; font-size: 1rem; outline: none; }
        .wish-input:focus { border-color: #3895d6; box-shadow: 0 0 0 3px rgba(70,160,255,0.2); }
        .wish-submit-btn { background: linear-gradient(115deg, #57a8e0, #388ac7); border: none; border-radius: 40px; padding: 0.8rem 2rem; font-weight: 600; color: white; cursor: pointer; font-size: 1rem; flex: 1; min-width: 100px; transition: transform 0.1s; }
        .wish-submit-btn:hover { transform: translateY(-1px); background: linear-gradient(115deg, #68b8f0, #4797cf); }
        .wish-empty { text-align: center; padding: 2rem; color: #6589a8; background: #e6f0fa; border-radius: 2rem; }
        .login-btn-header {
            background: rgba(90,170,240,0.25);
            border: 1.5px solid #4797cf;
            color: #1a5777;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .login-btn-header:hover {
            background: rgba(70,150,230,0.4);
            transform: translateY(-1px);
            border-color: #2d7eb3;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; color: #1a5777; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.7rem 1rem; border-radius: 40px; border: 1px solid #b3d6f0; outline: none; font-size: 1rem; background: white; }
        .form-group textarea { border-radius: 20px; resize: vertical; }

<script>
    // ==================== 全局变量 ====================
    let gameDB = [];
    let dataLoaded = false;
    let currentUser = null;
    let wishCurrentPage = 1, wishTotalPages = 1, wishTotal = 0;
    let currentMode = 'game';
    let currentGameQuery = '';
    let gameCurrentPage = 1, gameTotalPages = 1, gameTotalCount = 0;
    const pageSize = 4;

    // ==================== 辅助函数 ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== 游戏数据加载 ====================
    async function loadGameData() {
        const timestamp = Date.now();
        const urls = [
            `/games.json?t=${timestamp}`,
            `https://raw.githubusercontent.com/131474/CCLY/main/games.json?t=${timestamp}`
        ];

        async function fetchWithTimeout(url, timeout = 10000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(id);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        let newGameDB = null;
        let lastError = null;
        for (const url of urls) {
            try {
                console.log(`尝试加载: ${url}`);
                newGameDB = await fetchWithTimeout(url, 10000);
                console.log(`成功从 ${url} 加载`);
                break;
            } catch (error) {
                console.warn(`从 ${url} 加载失败:`, error);
                lastError = error;
            }
        }

        if (!newGameDB) {
            console.error('所有数据源均加载失败', lastError);
            gameDB = [];
            dataLoaded = true;
            alert('游戏数据加载失败，请检查网络或刷新页面重试');
            return;
        }

        // 缓存到 localStorage
        try {
            localStorage.setItem('gamesDB', JSON.stringify(newGameDB));
        } catch(e) {}

        gameDB = newGameDB;
        dataLoaded = true;
        console.log(`✅ 成功加载 ${gameDB.length} 个游戏`);
        renderHotGames();
    }

    function renderHotGames() {
        const hotSection = document.getElementById('hotSection');
        const hotScroll = document.getElementById('hotScroll');
        if (!hotSection || !hotScroll) return;
        if (!gameDB.length) {
            hotSection.style.display = 'none';
            return;
        }
        const hotGames = gameDB.slice(0, 10);
        hotScroll.innerHTML = hotGames.map(game => {
            let displayName = game.shortName;
            if (!displayName) {
                const rawName = game.name;
                displayName = rawName.length > 5 ? rawName.slice(0,5) + '…' : rawName;
            }
            const coverUrl = game.cover ? game.cover : 'https://via.placeholder.com/80x80?text=🎮';
            return `
                <div class="hot-item" data-name="${escapeHtml(game.name)}">
                    <img src="${coverUrl}" alt="${escapeHtml(displayName)}" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80?text=🎮'">
                    <span>${escapeHtml(displayName)}</span>
                </div>
            `;
        }).join('');
        hotSection.style.display = 'block';
        document.querySelectorAll('.hot-item').forEach(item => {
            item.addEventListener('click', () => {
                const gameName = item.getAttribute('data-name');
                if (gameName) searchByKeyword(gameName);
            });
        });
    }

    // ==================== 游戏搜索与分页 ====================
    function matchesQuery(gameName, query) {
        const nameLower = gameName.toLowerCase();
        const queryLower = query.toLowerCase();
        let pos = -1;
        for (let i = 0; i < queryLower.length; i++) {
            const ch = queryLower[i];
            const nextPos = nameLower.indexOf(ch, pos + 1);
            if (nextPos === -1) return false;
            pos = nextPos;
        }
        return true;
    }

    function calculateScore(gameName, query) {
        let nameForScore = gameName;
        if (gameName.startsWith('（Switch）')) {
            nameForScore = gameName.substring(8);
        }
        const nameLower = nameForScore.toLowerCase();
        const queryLower = query.toLowerCase();
        const contIdx = nameLower.indexOf(queryLower);
        if (contIdx !== -1) {
            return 100000 - contIdx * 10;
        }
        const firstIdx = nameLower.indexOf(queryLower[0]);
        if (firstIdx !== -1) {
            return 10000 - firstIdx * 10;
        }
        return 0;
    }

    async function mockBackendAPI(query, page) {
        if (!dataLoaded) return { data: [], total: 0, page: 1, totalPages: 1 };
        let filtered = gameDB.filter(g => matchesQuery(g.name, query));
        filtered.sort((a, b) => {
            const scoreA = calculateScore(a.name, query);
            const scoreB = calculateScore(b.name, query);
            return scoreB - scoreA;
        });
        const total = filtered.length;
        const totalPages = Math.ceil(total / pageSize);
        const start = (page - 1) * pageSize;
        const data = filtered.slice(start, start + pageSize);
        return { data: data, total: total, page: page, totalPages: totalPages };
    }

    async function loadGamePage(page) {
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        modalBody.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="loading-spinner"></div>加载游戏...</div>`;
        const res = await mockBackendAPI(currentGameQuery, page);
        gameCurrentPage = res.page;
        gameTotalPages = res.totalPages;
        gameTotalCount = res.total;
        modalTitle.innerHTML = `🔍查询到 <span class="result-count">${gameTotalCount}</span> 个游戏`;
        modalBody.innerHTML = generateGameCards(res.data);
        for(let i=0; i<res.data.length; i++) {
            const game = res.data[i];
            for(let j=0; j<game.links.length; j++) {
                const container = document.getElementById(`qr-${i}-${j}`);
                if(container && game.links[j].url) await generateQRCode(container, game.links[j].url);
            }
        }
        attachQrZoom();
        document.getElementById('pageInfo').innerText = `第 ${gameCurrentPage}/${gameTotalPages} 页 (共${gameTotalCount}个)`;
        document.getElementById('prevPage').disabled = gameCurrentPage <= 1;
        document.getElementById('nextPage').disabled = gameCurrentPage >= gameTotalPages;
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('download-tip').style.display = 'flex';
    }

    function generateGameCards(games){
        if(!games.length) return '<div class="empty-modal-msg">🔍 未找到游戏</div>';
        let html = '';
        games.forEach((game, idx) => {
            html += `<div class="modal-game-card">
                        <div class="game-title-row">🎮 ${game.name}</div>
                        <div class="modal-qr-group">`;
            game.links.forEach((link, linkIdx) => {
                html += `<div class="modal-qr-item" data-link="${link.url}" data-platform="${link.name}" data-code="${link.code || ''}">
                            <div class="qr-code-box" id="qr-${idx}-${linkIdx}"></div>
                            <span class="qr-label">${link.name}</span>
                         </div>`;
            });
            html += `</div></div>`;
        });
        return html;
    }

    // ==================== QR 相关函数 ====================
    async function generateQRCode(container, text) {
        if (!text) { container.innerHTML = '无'; return; }
        container.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        await QRCode.toCanvas(canvas, text, { width: 50 });
        container.appendChild(canvas);
    }

    function attachQrZoom() {
        document.querySelectorAll('.modal-qr-item').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const link = el.dataset.link;
                let platform = el.dataset.platform;
                if (platform && platform.includes('百度网盘')) {
                    platform = '百度网盘（提取码8888）';
                }
                if (link) showZoom(platform, link);
            });
        });
    }

    function showZoom(platform, link) {
        const zoomBox = document.getElementById('zoomQrBox');
        zoomBox.innerHTML = '';
        QRCode.toCanvas(document.createElement('canvas'), link, { width: 200 }, (err, canvas) => {
            if (canvas) { canvas.style.width = '100%'; zoomBox.appendChild(canvas); }
        });
        document.getElementById('zoomPlatform').innerText = platform;
        const pcHint = document.querySelector('.pc');
        if (pcHint) pcHint.innerText = `${platform}APP扫码获取`;
        document.getElementById('zoomModal').classList.add('show');
        window.currentZoomLink = link;
    }

    function closeZoom() { document.getElementById('zoomModal').classList.remove('show'); }
    function openResultModal() { document.getElementById('resultModal').classList.add('show'); }
    function closeResultModal() { 
        document.getElementById('resultModal').classList.remove('show');
        document.getElementById('pagination').style.display = 'flex';
    }

    async function searchByKeyword(keyword) {
        if (!dataLoaded) { alert('游戏数据还在加载中，请稍后再试'); return; }
        currentMode = 'game';
        currentGameQuery = keyword;
        openResultModal();
        await loadGamePage(1);
    }

    function handlePrevPage() {
        if (currentMode === 'game' && gameCurrentPage > 1) loadGamePage(gameCurrentPage - 1);
        else if (currentMode === 'wish' && wishCurrentPage > 1) renderWishModal(wishCurrentPage - 1);
    }

    function handleNextPage() {
        if (currentMode === 'game' && gameCurrentPage < gameTotalPages) loadGamePage(gameCurrentPage + 1);
        else if (currentMode === 'wish' && wishCurrentPage < wishTotalPages) renderWishModal(wishCurrentPage + 1);
    }

    // ==================== 工具按钮 ====================
    const toolButtons = {
        switchZoneBtn: { title: '🎮 Switch专区', content: `<div class="tool-content" style="text-align: center;"><h3>🎮 Switch 资源专区</h3><div class="switch-area-icons" style="display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin: 1.5rem 0;"><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="switchEmulatorBtn"><div style="font-size: 2.5rem;">🕹️</div><div style="font-weight: bold; margin: 0.5rem 0;">Switch模拟器</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="switchKeyBtn"><div style="font-size: 2.5rem;">🔑</div><div style="font-weight: bold; margin: 0.5rem 0;">密钥固件</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="switchGamesBtn"><div style="font-size: 2.5rem;">🎮</div><div style="font-weight: bold; margin: 0.5rem 0;">Switch游戏合集</div><div style="font-size: 0.8rem; color: #4797cf;">点击查看</div></div></div><p style="font-size: 0.8rem; color: #6589a8;">点击按钮自动搜索相关资源</p></div>` },
        nsMobileEmulatorBtn: { title: '📱 手机游戏', content: `<div class="tool-content" style="text-align: center;"><h3>📱 手机游戏资源包</h3><p>扫描下方二维码下载（安卓/iOS）</p><div class="modal-qr-group" style="justify-content: center;"><div class="modal-qr-item" id="quarkQr"><div class="qr-code-box" id="quarkQrCode"></div><span class="qr-label">夸克网盘</span></div><div class="modal-qr-item" id="xunleiQr"><div class="qr-code-box" id="xunleiQrCode"></div><span class="qr-label">迅雷网盘</span></div><div class="modal-qr-item" id="baiduQr"><div class="qr-code-box" id="baiduQrCode"></div><span class="qr-label">百度网盘</span></div></div><p style="font-size: 0.8rem; color: #6589a8;">如果扫码无效，请联系我们更新链接</p></div>` },
        atmosphereBtn: { title: '🌐 常用工具', content: `<div class="tool-content" style="text-align: center;"><h3>🛠️ 常用工具</h3><div class="tools-area-icons" style="display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin: 1.5rem 0;"><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="losslessBtn"><div style="font-size: 2.5rem;">🦆</div><div style="font-weight: bold; margin: 0.5rem 0;">小黄鸭补帧工具</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="pkhexBtn"><div style="font-size: 2.5rem;">🐾</div><div style="font-weight: bold; margin: 0.5rem 0;">PKHeX</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div></div><p style="font-size: 0.8rem; color: #6589a8;">点击按钮自动搜索相关资源</p></div>` },
        exchangeBtn: { title: '🐧 交流群', content: `<div class="tool-content" style="text-align: center;"><h3 style="margin-bottom: 1rem;">📢 玩家交流群</h3><div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;"><div style="background: #f0f6ff; border-radius: 20px; padding: 1rem; width: 200px; cursor: pointer;" id="qqGroupBox"><div style="font-size: 2rem;">🐧</div><div style="font-weight: bold; margin: 0.5rem 0;">QQ群</div><div style="color: #2b5f88;" id="qqNum">1064508042</div><div style="font-size: 0.7rem; margin-top: 0.3rem;">点击复制</div></div></div><p style="margin-top: 1rem; font-size: 0.8rem; color: #6589a8;">欢迎各位玩家加入交流~</p></div>` },
        feedbackBtn: { title: '💬 反馈问题', content: `<div class="tool-content"><h3>📢 链接失效反馈</h3><p>要是发现链接失效，请联系QQ群 <strong style="color:#2b5f88; cursor:pointer;" id="feedbackQQ">1064508042</strong> 告知，我们会尽快修复。</p><div id="feedbackResult" class="error-msg" style="margin-top:1rem; color:green;"></div></div>` }
    };

    function openToolModal(title, content) {
        document.getElementById('pagination').style.display = 'none';
        document.getElementById('download-tip').style.display = 'none';
        currentMode = 'tool';
        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('modalBody').innerHTML = content;
        openResultModal();
        if (title === '📱 手机游戏') {
            const isDesktop = window.innerWidth > 768;
            const qrSize = isDesktop ? 110 : 55;
            const quarkUrl = 'https://pan.quark.cn/s/8ba37e43e4c2';
            const xunleiUrl = 'https://pan.xunlei.com/s/VOpBndBIIEKl7KU23q3dVgZlA1?pwd=qqyq#';
            const baiduUrl = 'https://pan.baidu.com/s/xxxx';
            const quarkContainer = document.getElementById('quarkQrCode');
            const xunleiContainer = document.getElementById('xunleiQrCode');
            const baiduContainer = document.getElementById('baiduQrCode');
            const quarkItem = document.getElementById('quarkQr');
            const xunleiItem = document.getElementById('xunleiQr');
            const baiduItem = document.getElementById('baiduQr');
            if (quarkItem) quarkItem.classList.add('mobile-game-qr');
            if (xunleiItem) xunleiItem.classList.add('mobile-game-qr');
            if (baiduItem) baiduItem.classList.add('mobile-game-qr');
            async function genQR(container, url, size) {
                if (!container) return;
                container.innerHTML = '';
                const canvas = document.createElement('canvas');
                canvas.style.width = `${size}px`;
                canvas.style.height = `${size}px`;
                await QRCode.toCanvas(canvas, url, { width: size });
                container.appendChild(canvas);
            }
            if (quarkContainer) genQR(quarkContainer, quarkUrl, qrSize);
            if (xunleiContainer) genQR(xunleiContainer, xunleiUrl, qrSize);
            if (baiduContainer) genQR(baiduContainer, baiduUrl, qrSize);
            document.getElementById('quarkQr')?.addEventListener('click', () => showZoom('夸克网盘', quarkUrl));
            document.getElementById('xunleiQr')?.addEventListener('click', () => showZoom('迅雷网盘', xunleiUrl));
            document.getElementById('baiduQr')?.addEventListener('click', () => showZoom('百度网盘', baiduUrl));
        }
        if (title === '🐧 交流群') {
            const qqBox = document.getElementById('qqGroupBox');
            const qqNumSpan = document.getElementById('qqNum');
            const qqNum = qqNumSpan ? qqNumSpan.innerText : '1064508042';
            const copyHandler = () => { navigator.clipboard.writeText(qqNum).then(() => alert('QQ群号已复制: ' + qqNum)).catch(() => { const t = document.createElement('textarea'); t.value = qqNum; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('QQ群号已复制: ' + qqNum); }); };
            if (qqBox) qqBox.addEventListener('click', copyHandler);
        }
        if (title === '💬 反馈问题') {
            const feedbackQQ = document.getElementById('feedbackQQ');
            if (feedbackQQ) feedbackQQ.addEventListener('click', () => { const qq = feedbackQQ.innerText; navigator.clipboard.writeText(qq).then(() => alert('QQ群号已复制: ' + qq)).catch(() => { const t = document.createElement('textarea'); t.value = qq; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('QQ群号已复制: ' + qq); }); });
        }
        if (title === '🎮 Switch专区') {
            setTimeout(() => {
                document.getElementById('switchEmulatorBtn')?.addEventListener('click', () => { closeResultModal(); searchByKeyword('Switch模拟器'); });
                document.getElementById('switchKeyBtn')?.addEventListener('click', () => { closeResultModal(); searchByKeyword('密钥固件'); });
                document.getElementById('switchGamesBtn')?.addEventListener('click', () => { closeResultModal(); searchByKeyword('switch'); });
            }, 0);
        }
        if (title === '🌐 常用工具') {
            setTimeout(() => {
                document.getElementById('losslessBtn')?.addEventListener('click', () => { closeResultModal(); searchByKeyword('小黄鸭补帧工具'); });
                document.getElementById('pkhexBtn')?.addEventListener('click', () => { closeResultModal(); searchByKeyword('PKHeX'); });
            }, 0);
        }
    }

    function copyLinkToClipboard(link) { if(link){ navigator.clipboard.writeText(link); alert('链接已复制'); } }
    function jumpToLink(link) { if(link) window.open(link, '_blank'); }
    function closeAuthModal() { document.getElementById('authModal').classList.remove('show'); }

    function showAuthModal(mode) {
        const modal = document.getElementById('authModal');
        const titleEl = document.getElementById('authModalTitle');
        const container = document.getElementById('authFormContainer');
        if(mode === 'login') {
            titleEl.innerText = '登录账号';
            container.innerHTML = `<div class="form-group"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com"></div><div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="密码"></div><button class="auth-btn" id="submitLoginBtn">登录</button><div class="switch-auth" id="switchToReg">没有账号？ 立即注册</div><div id="authError" class="error-msg"></div>`;
            document.getElementById('submitLoginBtn')?.addEventListener('click', () => { alert('后续敬请期待'); closeAuthModal(); });
            document.getElementById('switchToReg')?.addEventListener('click', () => showAuthModal('register'));
        } else {
            titleEl.innerText = '注册账号';
            container.innerHTML = `<div class="form-group"><label>昵称</label><input type="text" id="regNickname" placeholder="昵称"></div><div class="form-group"><label>邮箱</label><input type="email" id="regEmail" placeholder="your@email.com"></div><div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="密码"></div><button class="auth-btn" id="submitRegBtn">注册</button><div class="switch-auth" id="switchToLogin">已有账号？ 去登录</div><div id="authError" class="error-msg"></div>`;
            document.getElementById('submitRegBtn')?.addEventListener('click', () => { alert('注册成功'); closeAuthModal(); });
            document.getElementById('switchToLogin')?.addEventListener('click', () => showAuthModal('login'));
        }
        modal.classList.add('show');
    }

    async function renderWishModal(page=1) {
        document.getElementById('download-tip').style.display = 'none';
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="loading-spinner"></div>加载愿望...</div>`;
        const result = await fetchWishes(page);
        const wishes = result.data;
        wishCurrentPage = result.page;
        wishTotalPages = result.totalPages;
        wishTotal = result.total;
        let wishItems = '';
        if(!wishes.length) wishItems = '<div class="wish-empty">✨ 还没有愿望，快许下第一个愿望吧</div>';
        else {
            wishes.forEach(w => {
                wishItems += `<div class="wish-item"><div class="wish-text">💬 ${w.text}</div>${w.reply ? `<div class="wish-reply">📢 回复：${w.reply}</div>` : ''}<div class="wish-time">${w.time || ''}</div></div>`;
            });
        }
        const formHtml = `<div class="wish-form"><input class="wish-input" id="newWishInput" placeholder="许下心愿，例如：求星之卡比..."><button class="wish-submit-btn" id="submitWishBtn">✨ 许愿</button></div>`;
        modalBody.innerHTML = `${formHtml}<div class="wish-list">${wishItems}</div>`;
        document.getElementById('submitWishBtn')?.addEventListener('click', async () => {
            const input = document.getElementById('newWishInput');
            const txt = input.value.trim();
            if(txt.length<2) { alert('愿望至少2个字'); return; }
            const res = await createWish(txt);
            if(res.code == 0) { alert('许愿成功！'); input.value=''; await renderWishModal(wishCurrentPage); }
            else alert('许愿失败，请稍后再试');
        });
        document.getElementById('pageInfo').innerText = `第 ${wishCurrentPage}/${wishTotalPages} 页 (共${wishTotal}条)`;
        document.getElementById('prevPage').disabled = wishCurrentPage <= 1;
        document.getElementById('nextPage').disabled = wishCurrentPage >= wishTotalPages;
        document.getElementById('pagination').style.display = 'flex';
    }

    async function handleWishClickWithAuth() {
        if(!currentUser) { alert('请先登录'); showAuthModal('login'); return; }
        currentMode = 'wish';
        document.getElementById('modalTitle').innerHTML = '<span>⛲ 许愿池 · 留下你的愿望</span>';
        openResultModal();
        await renderWishModal(1);
    }

    async function fetchWishes(page) { return { data: [], total: 0, page: 1, totalPages: 1 }; }
    async function createWish(text) { return { code: 0 }; }

    function loadStoredUser() { currentUser = null; updateAuthUI(); }
    function updateAuthUI() {
        const authArea = document.getElementById('authArea');
        if(currentUser && currentUser.nickname) {
            authArea.innerHTML = `<div><span>😀${currentUser.nickname}</span><button class="logout-btn" id="logoutBtn">退出</button></div>`;
            document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser=null; updateAuthUI(); });
        } else {
            authArea.innerHTML = `<button class="login-btn-header" id="openLoginModalBtn">🔐 登录 / 注册</button>`;
            document.getElementById('openLoginModalBtn')?.addEventListener('click', () => showAuthModal('login'));
        }
    }

    function bindEvents() {
        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('gameSearchInput').value.trim();
            if (!query) return;
            currentMode = 'game';
            currentGameQuery = query;
            openResultModal();
            loadGamePage(1);
        });
        document.getElementById('closeModalBtn').addEventListener('click', closeResultModal);
        document.getElementById('closeAuthModalBtn').addEventListener('click', closeAuthModal);
        document.getElementById('closeZoomBtn').addEventListener('click', closeZoom);
        document.getElementById('prevPage').addEventListener('click', handlePrevPage);
        document.getElementById('nextPage').addEventListener('click', handleNextPage);
        document.getElementById('jumpDirectBtn')?.addEventListener('click', () => jumpToLink(window.currentZoomLink));
        document.getElementById('copyDirectBtn')?.addEventListener('click', () => copyLinkToClipboard(window.currentZoomLink));
        document.getElementById('wishingWellBtn').addEventListener('click', handleWishClickWithAuth);
        for (const [btnId, config] of Object.entries(toolButtons)) {
            const btn = document.getElementById(btnId);
            if (btn) btn.onclick = () => openToolModal(config.title, config.content);
        }
        document.querySelectorAll('.mock-link').forEach(el => {
            el.addEventListener('click', () => {
                const keyword = el.innerText.trim();
                if (keyword) {
                    document.getElementById('gameSearchInput').value = keyword;
                    document.getElementById('searchBtn').click();
                }
            });
        });
        const searchInput = document.getElementById('gameSearchInput');
        if (searchInput) searchInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('searchBtn').click(); } });
    }

    // 初始化
    loadStoredUser();
    bindEvents();
    loadGameData();
</script>
</body>
</html>
