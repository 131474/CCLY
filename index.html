    <script>
        (async function() {
            const verKey = 'app_ver';
            const verUrl = 'version.json?t=' + Date.now();
            try {
                const resp = await fetch(verUrl, { cache: 'no-store' });
                if (!resp.ok) throw new Error();
                const data = await resp.json();
                const newVer = data.version;
                const oldVer = localStorage.getItem(verKey);
                if (oldVer !== newVer) {
                    localStorage.removeItem('cached_games');
                    localStorage.setItem(verKey, newVer);
                    location.reload(true);
                }
            } catch(e) { console.warn(e); }
        })();
    </script>

<script>
    // ==================== 全局变量 ====================
    let gameData = [];
    let dataReady = false;
    let curUser = null;
    let wishPage = 1, wishTotalPages = 1, wishTotal = 0;
    let curMode = 'game';
    let curQuery = '';
    let gamePage = 1, gameTotalPages = 1, gameTotal = 0;
    const pageSize = 4;

    let libPage = 1;
    let libTotalPages = 1;
    let totalGames = 0;
    let sortedGames = [];

    const CACHE_KEY = 'cached_games';

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
    }

    function getChangeDate(game) {
        if (game.lastChange) {
            const dateStr = game.lastChange.slice(0,10);
            const changeDate = new Date(dateStr);
            const today = new Date(); today.setHours(0,0,0,0);
            const threeDaysAgo = new Date(today); threeDaysAgo.setDate(today.getDate()-2);
            if (changeDate >= threeDaysAgo) return dateStr;
        }
        return null;
    }

    function getChangeTime(game) {
        return game.lastChange ? new Date(game.lastChange).getTime() : 0;
    }

    function buildSorted() {
        const withTime = [], withoutTime = [];
        for (const g of gameData) {
            const ts = getChangeTime(g);
            if (ts > 0) withTime.push({ game: g, time: ts, date: getChangeDate(g) });
            else withoutTime.push({ game: g, time: 0, date: null });
        }
        withTime.sort((a,b) => b.time - a.time);
        withoutTime.sort((a,b) => a.game.name.localeCompare(b.game.name));
        return [...withTime, ...withoutTime];
    }

    async function renderLib(page) {
        const body = document.getElementById('libBody');
        const countSpan = document.getElementById('libCount');
        const pagDiv = document.getElementById('libPagination');
        if (!body) return;
        if (!dataReady) {
            body.innerHTML = '<div class="emptyMsg">游戏数据加载中...</div>';
            pagDiv.style.display = 'none';
            return;
        }
        const sorted = buildSorted();
        sortedGames = sorted;
        totalGames = sortedGames.length;
        libTotalPages = Math.ceil(totalGames / pageSize);
        const start = (page-1)*pageSize;
        const pageGames = sortedGames.slice(start, start+pageSize);
        countSpan.innerText = totalGames;
        if (totalGames === 0) {
            body.innerHTML = '<div class="emptyMsg">暂无游戏数据</div>';
            pagDiv.style.display = 'none';
            return;
        }
        let html = '';
        for (let i=0; i<pageGames.length; i++) {
            const g = pageGames[i].game;
            const dispDate = getChangeDate(g);
            html += `<div class="gameCard">
                        <div class="gameTitleRow">
                            <div class="gameName">🎮 ${escapeHtml(g.name)}</div>
                            ${dispDate ? `<div class="updateBadge">更新于 ${dispDate}</div>` : ''}
                        </div>
                        <div class="qrGroup">`;
            if (g.links && g.links.length) {
                for (let li=0; li<g.links.length; li++) {
                    const link = g.links[li];
                    html += `<div class="qrItem" data-link="${escapeHtml(link.url)}" data-platform="${escapeHtml(link.name)}">
                                <div class="qrBox" id="libqr-${i}-${li}"></div>
                                <span class="qrLabel">${escapeHtml(link.name)}</span>
                             </div>`;
                }
            } else {
                html += `<span class="qrLabel">无链接</span>`;
            }
            html += `</div></div>`;
        }
        body.innerHTML = html;
        for (let i=0; i<pageGames.length; i++) {
            const g = pageGames[i].game;
            if (g.links) {
                for (let li=0; li<g.links.length; li++) {
                    const url = g.links[li].url;
                    const cont = document.getElementById(`libqr-${i}-${li}`);
                    if (cont && url) await genQR(cont, url);
                }
            }
        }
        attachZoom();
        document.getElementById('libPageInfo').innerText = `第 ${page}/${libTotalPages} 页 (共${totalGames}个)`;
        document.getElementById('libPrev').disabled = (page <= 1);
        document.getElementById('libNext').disabled = (page >= libTotalPages);
        pagDiv.style.display = 'flex';
    }

    function openLibModal() {
        libPage = 1;
        renderLib(1);
        document.getElementById('libraryModal').classList.add('show');
    }
    function closeLibModal() {
        document.getElementById('libraryModal').classList.remove('show');
    }

    async function loadGameData() {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            try {
                const parsed = JSON.parse(cached);
                if (Array.isArray(parsed) && parsed.length) {
                    gameData = parsed;
                    dataReady = true;
                    renderHot();
                    console.log('从缓存加载，共', gameData.length);
                }
            } catch(e) {}
        }
        const ts = Date.now();
        const urls = [`/games.json?t=${ts}`, `https://raw.githubusercontent.com/131474/CCLY/main/games.json?t=${ts}`];
        async function fetchWithTimeout(url, timeout=10000) {
            const ctrl = new AbortController();
            const id = setTimeout(() => ctrl.abort(), timeout);
            try {
                const res = await fetch(url, { signal: ctrl.signal, cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } });
                clearTimeout(id);
                if (!res.ok) throw new Error();
                return await res.json();
            } catch(e) {
                clearTimeout(id);
                throw e;
            }
        }
        let newData = null;
        for (const url of urls) {
            try {
                console.log(`尝试 ${url}`);
                newData = await fetchWithTimeout(url, 10000);
                console.log(`成功 ${url}`);
                break;
            } catch(e) { console.warn(e); }
        }
        if (!newData) {
            if (!dataReady) alert('游戏数据加载失败，请检查网络或刷新页面重试');
            return;
        }
        localStorage.setItem(CACHE_KEY, JSON.stringify(newData));
        if (JSON.stringify(gameData) !== JSON.stringify(newData)) {
            gameData = newData;
            renderHot();
            const libModal = document.getElementById('libraryModal');
            if (libModal && libModal.classList.contains('show')) renderLib(libPage);
        } else if (!dataReady) {
            gameData = newData;
            renderHot();
        }
        dataReady = true;
    }

    function renderHot() {
        const hotDiv = document.getElementById('hotSection');
        const scrollDiv = document.getElementById('hotScroll');
        if (!hotDiv || !scrollDiv) return;
        if (!gameData.length) {
            hotDiv.style.display = 'none';
            return;
        }
        const hotGames = gameData.slice(0,10);
        scrollDiv.innerHTML = hotGames.map(g => {
            let dispName = g.shortName;
            if (!dispName) {
                const raw = g.name;
                dispName = raw.length > 5 ? raw.slice(0,5)+'…' : raw;
            }
            const cover = g.cover ? g.cover : 'https://via.placeholder.com/80x80?text=🎮';
            return `<div class="hotItem" data-name="${escapeHtml(g.name)}">
                        <img src="${cover}" alt="${escapeHtml(dispName)}" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80?text=🎮'">
                        <span>${escapeHtml(dispName)}</span>
                    </div>`;
        }).join('');
        hotDiv.style.display = 'block';
        document.querySelectorAll('.hotItem').forEach(el => {
            el.addEventListener('click', () => {
                const name = el.getAttribute('data-name');
                if (name) searchByName(name);
            });
        });
    }

    function matchesQuery(name, q) {
        const n = name.toLowerCase();
        const ql = q.toLowerCase();
        let pos = -1;
        for (let i=0; i<ql.length; i++) {
            const next = n.indexOf(ql[i], pos+1);
            if (next === -1) return false;
            pos = next;
        }
        return true;
    }

    function calcScore(name, q) {
        let ns = name;
        if (ns.startsWith('（Switch）')) ns = ns.substring(8);
        const nl = ns.toLowerCase();
        const ql = q.toLowerCase();
        const idx = nl.indexOf(ql);
        if (idx !== -1) return 100000 - idx*10;
        const first = nl.indexOf(ql[0]);
        if (first !== -1) return 10000 - first*10;
        return 0;
    }

    async function mockApi(query, page) {
        if (!dataReady) return { data:[], total:0, page:1, totalPages:1 };
        let filtered = gameData.filter(g => matchesQuery(g.name, query));
        filtered.sort((a,b) => calcScore(b.name, query) - calcScore(a.name, query));
        const total = filtered.length;
        const totalPages = Math.ceil(total / pageSize);
        const start = (page-1)*pageSize;
        const data = filtered.slice(start, start+pageSize);
        return { data, total, page, totalPages };
    }

    async function loadGamePage(page) {
        const body = document.getElementById('modalBody');
        const title = document.getElementById('modalTitle');
        body.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="spinner"></div>加载游戏...</div>`;
        const res = await mockApi(curQuery, page);
        gamePage = res.page;
        gameTotalPages = res.totalPages;
        gameTotal = res.total;
        title.innerHTML = `🔍查询到 <span class="resultCount">${gameTotal}</span> 个游戏`;
        body.innerHTML = generateCards(res.data);
        for (let i=0; i<res.data.length; i++) {
            const g = res.data[i];
            for (let j=0; j<g.links.length; j++) {
                const cont = document.getElementById(`qr-${i}-${j}`);
                if (cont && g.links[j].url) await genQR(cont, g.links[j].url);
            }
        }
        attachZoom();
        document.getElementById('pageInfo').innerText = `第 ${gamePage}/${gameTotalPages} 页 (共${gameTotal}个)`;
        document.getElementById('prevPage').disabled = gamePage <= 1;
        document.getElementById('nextPage').disabled = gamePage >= gameTotalPages;
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('downloadTip').style.display = 'flex';
    }

    function generateCards(games) {
        if (!games.length) return '<div class="emptyMsg">🔍 未找到游戏</div>';
        let html = '';
        games.forEach((g, idx) => {
            html += `<div class="gameCard">
                        <div class="gameTitleRow">🎮 ${g.name}</div>
                        <div class="qrGroup">`;
            g.links.forEach((link, lidx) => {
                html += `<div class="qrItem" data-link="${link.url}" data-platform="${link.name}" data-code="${link.code || ''}">
                            <div class="qrBox" id="qr-${idx}-${lidx}"></div>
                            <span class="qrLabel">${link.name}</span>
                         </div>`;
            });
            html += `</div></div>`;
        });
        return html;
    }

    async function genQR(container, text) {
        if (!text) { container.innerHTML = '无'; return; }
        container.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        await QRCode.toCanvas(canvas, text, { width: 50 });
        container.appendChild(canvas);
    }

    function attachZoom() {
        document.querySelectorAll('.qrItem').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const link = el.dataset.link;
                let plat = el.dataset.platform;
                if (plat && plat.includes('百度网盘')) plat = '百度网盘（提取码8888）';
                if (link) showZoom(plat, link);
            });
        });
    }

    function showZoom(platform, link) {
        const box = document.getElementById('zoomQrBox');
        box.innerHTML = '';
        QRCode.toCanvas(document.createElement('canvas'), link, { width: 200 }, (err, canvas) => {
            if (canvas) { canvas.style.width = '100%'; box.appendChild(canvas); }
        });
        document.getElementById('zoomPlatform').innerText = platform;
        const pcHint = document.querySelector('.pcHint');
        if (pcHint) pcHint.innerText = `${platform}APP扫码获取`;
        document.getElementById('zoomModal').classList.add('show');
        window.curZoomLink = link;
    }

    function closeZoom() { document.getElementById('zoomModal').classList.remove('show'); }
    function openResultModal() { document.getElementById('resultModal').classList.add('show'); }
    function closeResultModal() { 
        document.getElementById('resultModal').classList.remove('show');
        document.getElementById('pagination').style.display = 'flex';
    }

    async function searchByName(keyword) {
        if (!dataReady) { alert('游戏数据还在加载中，请稍后再试'); return; }
        curMode = 'game';
        curQuery = keyword;
        openResultModal();
        await loadGamePage(1);
    }

    function handlePrev() {
        if (curMode === 'game' && gamePage > 1) loadGamePage(gamePage-1);
        else if (curMode === 'wish' && wishPage > 1) renderWish(wishPage-1);
    }
    function handleNext() {
        if (curMode === 'game' && gamePage < gameTotalPages) loadGamePage(gamePage+1);
        else if (curMode === 'wish' && wishPage < wishTotalPages) renderWish(wishPage+1);
    }

    const toolMap = {
        switchBtn: { title: '🎮 Switch专区', content: `<div class="toolContent" style="text-align: center;"><h3>🎮 Switch 资源专区</h3><div class="switchArea" style="display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin: 1.5rem 0;"><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="switchEmuBtn"><div style="font-size: 2.5rem;">🕹️</div><div style="font-weight: bold; margin: 0.5rem 0;">Switch模拟器</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="switchKeyBtn"><div style="font-size: 2.5rem;">🔑</div><div style="font-weight: bold; margin: 0.5rem 0;">密钥固件</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="switchGamesBtn"><div style="font-size: 2.5rem;">🎮</div><div style="font-weight: bold; margin: 0.5rem 0;">Switch游戏合集</div><div style="font-size: 0.8rem; color: #4797cf;">点击查看</div></div></div><p style="font-size: 0.8rem; color: #6589a8;">点击按钮自动搜索相关资源</p></div>` },
        mobileBtn: { title: '📱 手机游戏', content: `<div class="toolContent" style="text-align: center;"><h3>📱 手机游戏资源包</h3><p>扫描下方二维码下载（安卓/iOS）</p><div class="qrGroup" style="justify-content: center;"><div class="qrItem" id="quarkQr"><div class="qrBox" id="quarkQrCode"></div><span class="qrLabel">夸克网盘</span></div><div class="qrItem" id="xunleiQr"><div class="qrBox" id="xunleiQrCode"></div><span class="qrLabel">迅雷网盘</span></div><div class="qrItem" id="baiduQr"><div class="qrBox" id="baiduQrCode"></div><span class="qrLabel">百度网盘</span></div></div><p style="font-size: 0.8rem; color: #6589a8;">如果扫码无效，请联系我们更新链接</p></div>` },
        toolsBtn: { title: '🌐 常用工具', content: `<div class="toolContent" style="text-align: center;"><h3>🛠️ 常用工具</h3><div class="toolsArea" style="display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin: 1.5rem 0;"><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="losslessBtn"><div style="font-size: 2.5rem;">🦆</div><div style="font-weight: bold; margin: 0.5rem 0;">小黄鸭补帧工具</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div><div style="background: #f0f6ff; border-radius: 1.5rem; padding: 1.2rem; width: 180px; cursor: pointer;" id="pkhexBtn"><div style="font-size: 2.5rem;">🐾</div><div style="font-weight: bold; margin: 0.5rem 0;">PKHeX</div><div style="font-size: 0.8rem; color: #4797cf;">点击下载</div></div></div><p style="font-size: 0.8rem; color: #6589a8;">点击按钮自动搜索相关资源</p></div>` },
        groupBtn: { title: '🐧 交流群', content: `<div class="toolContent" style="text-align: center;"><h3 style="margin-bottom: 1rem;">📢 玩家交流群</h3><div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;"><div style="background: #f0f6ff; border-radius: 20px; padding: 1rem; width: 200px; cursor: pointer;" id="qqGroupBox"><div style="font-size: 2rem;">🐧</div><div style="font-weight: bold; margin: 0.5rem 0;">QQ群</div><div style="color: #2b5f88;" id="qqNum">1064508042</div><div style="font-size: 0.7rem; margin-top: 0.3rem;">点击复制</div></div></div><p style="margin-top: 1rem; font-size: 0.8rem; color: #6589a8;">欢迎各位玩家加入交流~</p></div>` },
        feedbackBtn: { title: '💬 反馈问题', content: `<div class="toolContent"><h3>📢 链接失效反馈</h3><p>要是发现链接失效，请联系QQ群 <strong style="color:#2b5f88; cursor:pointer;" id="feedbackQQ">1064508042</strong> 告知，我们会尽快修复。</p><div id="feedbackResult" class="errorMsg" style="margin-top:1rem; color:green;"></div></div>` }
    };

    function openTool(title, content) {
        document.getElementById('pagination').style.display = 'none';
        document.getElementById('downloadTip').style.display = 'none';
        curMode = 'tool';
        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('modalBody').innerHTML = content;
        openResultModal();
        if (title === '📱 手机游戏') {
            const isDesktop = window.innerWidth > 768;
            const qrSize = isDesktop ? 110 : 55;
            const quarkUrl = 'https://pan.quark.cn/s/8ba37e43e4c2';
            const xunleiUrl = 'https://pan.xunlei.com/s/VOpBndBIIEKl7KU23q3dVgZlA1?pwd=qqyq#';
            const baiduUrl = 'https://pan.baidu.com/s/1ROgJUWC1yohfN_f8lSI1Aw?pwd=8888';
            const qc = document.getElementById('quarkQrCode');
            const xc = document.getElementById('xunleiQrCode');
            const bc = document.getElementById('baiduQrCode');
            const qi = document.getElementById('quarkQr');
            const xi = document.getElementById('xunleiQr');
            const bi = document.getElementById('baiduQr');
            if (qi) qi.classList.add('mobileGameQr');
            if (xi) xi.classList.add('mobileGameQr');
            if (bi) bi.classList.add('mobileGameQr');
            async function gen(container, url, size) {
                if (!container) return;
                container.innerHTML = '';
                const canvas = document.createElement('canvas');
                canvas.style.width = `${size}px`;
                canvas.style.height = `${size}px`;
                await QRCode.toCanvas(canvas, url, { width: size });
                container.appendChild(canvas);
            }
            if (qc) gen(qc, quarkUrl, qrSize);
            if (xc) gen(xc, xunleiUrl, qrSize);
            if (bc) gen(bc, baiduUrl, qrSize);
            document.getElementById('quarkQr')?.addEventListener('click', () => showZoom('夸克网盘', quarkUrl));
            document.getElementById('xunleiQr')?.addEventListener('click', () => showZoom('迅雷网盘', xunleiUrl));
            document.getElementById('baiduQr')?.addEventListener('click', () => showZoom('百度网盘', baiduUrl));
        }
        if (title === '🐧 交流群') {
            const box = document.getElementById('qqGroupBox');
            const numSpan = document.getElementById('qqNum');
            const num = numSpan ? numSpan.innerText : '1064508042';
            const copy = () => { navigator.clipboard.writeText(num).then(() => alert('QQ群号已复制: '+num)).catch(()=>{ const t=document.createElement('textarea'); t.value=num; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('QQ群号已复制: '+num); }); };
            if (box) box.addEventListener('click', copy);
        }
        if (title === '💬 反馈问题') {
            const fb = document.getElementById('feedbackQQ');
            if (fb) fb.addEventListener('click', () => { const qq = fb.innerText; navigator.clipboard.writeText(qq).then(()=>alert('QQ群号已复制: '+qq)).catch(()=>{ const t=document.createElement('textarea'); t.value=qq; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('QQ群号已复制: '+qq); }); });
        }
        if (title === '🎮 Switch专区') {
            setTimeout(() => {
                document.getElementById('switchEmuBtn')?.addEventListener('click', () => { closeResultModal(); searchByName('Switch模拟器'); });
                document.getElementById('switchKeyBtn')?.addEventListener('click', () => { closeResultModal(); searchByName('密钥固件'); });
                document.getElementById('switchGamesBtn')?.addEventListener('click', () => { closeResultModal(); searchByName('switch'); });
            }, 0);
        }
        if (title === '🌐 常用工具') {
            setTimeout(() => {
                document.getElementById('losslessBtn')?.addEventListener('click', () => { closeResultModal(); searchByName('小黄鸭补帧工具'); });
                document.getElementById('pkhexBtn')?.addEventListener('click', () => { closeResultModal(); searchByName('PKHeX'); });
            }, 0);
        }
    }

    function copyLink(link) { if(link) { navigator.clipboard.writeText(link); alert('链接已复制'); } }
    function jumpLink(link) { if(link) window.open(link, '_blank'); }
    function closeAuth() { document.getElementById('authModal').classList.remove('show'); }

    function showAuth(mode) {
        const modal = document.getElementById('authModal');
        const titleEl = document.getElementById('authModalTitle');
        const container = document.getElementById('authFormContainer');
        if (mode === 'login') {
            titleEl.innerText = '登录账号';
            container.innerHTML = `<div class="formGroup"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com"></div><div class="formGroup"><label>密码</label><input type="password" id="loginPassword" placeholder="密码"></div><button class="authBtn" id="submitLoginBtn">登录</button><div class="switchAuth" id="switchToReg">没有账号？ 立即注册</div><div id="authError" class="errorMsg"></div>`;
            document.getElementById('submitLoginBtn')?.addEventListener('click', () => { alert('后续敬请期待'); closeAuth(); });
            document.getElementById('switchToReg')?.addEventListener('click', () => showAuth('register'));
        } else {
            titleEl.innerText = '注册账号';
            container.innerHTML = `<div class="formGroup"><label>昵称</label><input type="text" id="regNickname" placeholder="昵称"></div><div class="formGroup"><label>邮箱</label><input type="email" id="regEmail" placeholder="your@email.com"></div><div class="formGroup"><label>密码</label><input type="password" id="regPassword" placeholder="密码"></div><button class="authBtn" id="submitRegBtn">注册</button><div class="switchAuth" id="switchToLogin">已有账号？ 去登录</div><div id="authError" class="errorMsg"></div>`;
            document.getElementById('submitRegBtn')?.addEventListener('click', () => { alert('注册成功'); closeAuth(); });
            document.getElementById('switchToLogin')?.addEventListener('click', () => showAuth('login'));
        }
        modal.classList.add('show');
    }

    async function renderWish(page=1) {
        document.getElementById('downloadTip').style.display = 'none';
        const body = document.getElementById('modalBody');
        body.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="spinner"></div>加载愿望...</div>`;
        const result = await fetchWishes(page);
        const wishes = result.data;
        wishPage = result.page;
        wishTotalPages = result.totalPages;
        wishTotal = result.total;
        let items = '';
        if (!wishes.length) items = '<div class="wishEmpty">✨ 还没有愿望，快许下第一个愿望吧</div>';
        else {
            wishes.forEach(w => {
                items += `<div class="wishItem"><div class="wishText">💬 ${w.text}</div>${w.reply ? `<div class="wishReply">📢 回复：${w.reply}</div>` : ''}<div class="wishTime">${w.time || ''}</div></div>`;
            });
        }
        const formHtml = `<div class="wishForm"><input class="wishInput" id="newWishInput" placeholder="许下心愿，例如：求星之卡比..."><button class="wishSubmit" id="submitWishBtn">✨ 许愿</button></div>`;
        body.innerHTML = `${formHtml}<div class="wishList">${items}</div>`;
        document.getElementById('submitWishBtn')?.addEventListener('click', async () => {
            const inp = document.getElementById('newWishInput');
            const txt = inp.value.trim();
            if (txt.length<2) { alert('愿望至少2个字'); return; }
            const res = await createWish(txt);
            if (res.code == 0) { alert('许愿成功！'); inp.value=''; await renderWish(wishPage); }
            else alert('许愿失败，请稍后再试');
        });
        document.getElementById('pageInfo').innerText = `第 ${wishPage}/${wishTotalPages} 页 (共${wishTotal}条)`;
        document.getElementById('prevPage').disabled = wishPage <= 1;
        document.getElementById('nextPage').disabled = wishPage >= wishTotalPages;
        document.getElementById('pagination').style.display = 'flex';
    }

    async function handleWishWithAuth() {
        if (!curUser) { alert('请先登录'); showAuth('login'); return; }
        curMode = 'wish';
        document.getElementById('modalTitle').innerHTML = '<span>⛲ 许愿池 · 留下你的愿望</span>';
        openResultModal();
        await renderWish(1);
    }

    async function fetchWishes(page) { return { data: [], total: 0, page: 1, totalPages: 1 }; }
    async function createWish(text) { return { code: 0 }; }

    function loadStoredUser() { curUser = null; updateUI(); }
    function updateUI() {
        const area = document.getElementById('authArea');
        if (curUser && curUser.nickname) {
            area.innerHTML = `<div><span>😀${curUser.nickname}</span><button class="logoutBtn" id="logoutBtn">退出</button></div>`;
            document.getElementById('logoutBtn')?.addEventListener('click', () => { curUser=null; updateUI(); });
        } else {
            area.innerHTML = `<button class="loginBtn" id="openAuthBtn">🔐 登录 / 注册</button>`;
            document.getElementById('openAuthBtn')?.addEventListener('click', () => showAuth('login'));
        }
    }

    function bindAll() {
        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            curMode = 'game';
            curQuery = q;
            openResultModal();
            loadGamePage(1);
        });
        document.getElementById('closeModalBtn').addEventListener('click', closeResultModal);
        document.getElementById('closeAuthModalBtn').addEventListener('click', closeAuth);
        document.getElementById('closeZoomBtn').addEventListener('click', closeZoom);
        document.getElementById('prevPage').addEventListener('click', handlePrev);
        document.getElementById('nextPage').addEventListener('click', handleNext);
        document.getElementById('jumpDirectBtn')?.addEventListener('click', () => jumpLink(window.curZoomLink));
        document.getElementById('copyDirectBtn')?.addEventListener('click', () => copyLink(window.curZoomLink));
        document.getElementById('wishBtn').addEventListener('click', handleWishWithAuth);
        for (const [id, cfg] of Object.entries(toolMap)) {
            const btn = document.getElementById(id);
            if (btn) btn.onclick = () => openTool(cfg.title, cfg.content);
        }
        document.querySelectorAll('.demoLink').forEach(el => {
            el.addEventListener('click', () => {
                const kw = el.innerText.trim();
                if (kw) {
                    document.getElementById('searchInput').value = kw;
                    document.getElementById('searchBtn').click();
                }
            });
        });
        const libBtn = document.getElementById('libBtn');
        if (libBtn) libBtn.addEventListener('click', openLibModal);
        const closeLib = document.getElementById('closeLibModalBtn');
        if (closeLib) closeLib.addEventListener('click', closeLibModal);
        const libPrev = document.getElementById('libPrev');
        if (libPrev) libPrev.addEventListener('click', () => { if (libPage > 1) { libPage--; renderLib(libPage); } });
        const libNext = document.getElementById('libNext');
        if (libNext) libNext.addEventListener('click', () => { if (libPage < libTotalPages) { libPage++; renderLib(libPage); } });
        const inp = document.getElementById('searchInput');
        if (inp) inp.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('searchBtn').click(); } });
    }

    loadStoredUser();
    bindAll();
    loadGameData();
</script>
