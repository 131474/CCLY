
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>媛神游戏仓库 · 极速下载站</title>
    <style>
        /* 保留你原有的所有样式，不做删减，仅在最下方追加放大模态框专用样式 + 顶部域名提示条样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #dde9f5 0%, #c7d9e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-touch-callout: none; /* 禁用长按菜单 */
            -webkit-user-select: none;    /* 禁用选中 */
            user-select: none;
            flex-direction: column;
            gap: 1rem;
        }

        /* 冷色磨砂玻璃卡片 */
        .query-card {
            width: 100%;
            max-width: 950px;
            background: rgba(245, 250, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(160, 200, 240, 0.4);
            border-radius: 2.5rem;
            padding: 2.2rem 2rem 1.8rem 2rem;
            box-shadow: 0 25px 40px -20px rgba(30, 60, 90, 0.3), 0 10px 20px -5px rgba(140, 200, 255, 0.2), inset 0 1px 3px #ffffffcc;
            transition: transform 0.2s ease;
        }

        .query-card:hover {
            transform: scale(1.01);
            border-color: rgba(80, 160, 240, 0.6);
            box-shadow: 0 30px 45px -15px #2b4f6e40, 0 0 0 2px rgba(100, 180, 255, 0.2);
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.2rem;
            flex-wrap: wrap;
            gap: 0.25rem 0.5rem;
        }

        .game-house {
            font-size: 1.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(130deg, #1f6d8f, #1b5b7a, #134b66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px rgba(70, 160, 220, 0.3);
            line-height: 1.2;
        }

        .badge {
            background: rgba(90, 170, 240, 0.15);
            border: 1px solid rgba(70, 150, 230, 0.4);
            color: #1a5777;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        /* 发布人信息 */
        .publisher-line {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.1rem;
            margin-bottom: 1.8rem;
            color: #2f5570;
            font-size: 1rem;
            border-left: 3px solid #3f9ad0;
            padding-left: 1rem;
        }

        .publisher-icon {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 3px #6bb0e6);
        }

        .publisher-name {
            font-weight: 600;
            color: #1e4863;
        }

        .open-query {
            color: #336e91;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .open-query::before {
            content: "⚡";
            font-size: 1.1rem;
            opacity: 0.8;
            color: #3f95d1;
        }

        /* 搜索说明 */
        .search-hint {
            color: #215674;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            padding: 0.3rem 0 0.2rem 0;
            border-bottom: 1px dashed rgba(70, 140, 210, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hint-bold {
            font-weight: 600;
            color: #1b6c9c;
        }

        .fuzzy-tag {
            background: rgba(100, 170, 240, 0.15);
            border-radius: 20px;
            padding: 0.2rem 0.9rem;
            font-size: 0.8rem;
            color: #135d88;
            border: 0.5px solid rgba(60, 150, 230, 0.5);
            margin-left: auto;
        }

        /* 游戏名称标签 */
        .field-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #174a69;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            margin-bottom: 0.5rem;
        }

        .field-label span {
            background: rgba(170, 220, 255, 0.45);
            padding: 0.2rem 1rem 0.2rem 1.2rem;
            border-radius: 30px;
            border: 1px solid rgba(70, 150, 230, 0.3);
            backdrop-filter: blur(5px);
        }

        .ghost-asterisk {
            color: #1f7ab3;
            font-size: 1.3rem;
            margin-right: 4px;
        }

        /* 输入框 */
        .input-wrapper {
            position: relative;
            width: 100%;
            margin: 0.5rem 0 1rem 0;
        }

        .game-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #b3d6f0;
            border-radius: 60px;
            padding: 1.1rem 1.8rem;
            font-size: 1.2rem;
            color: #103f5c;
            caret-color: #2b8dcc;
            outline: none;
            transition: all 0.25s;
            box-shadow: inset 0 4px 8px rgba(0, 20, 40, 0.02), 0 2px 4px #c9e2ff;
            font-weight: 400;
        }

        .game-input::placeholder {
            color: #7096b5;
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 0.3px;
        }

        .game-input:focus {
            border-color: #3895d6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(70, 160, 255, 0.25), inset 0 2px 5px #d9ecff;
        }

        .input-emoji-decoration {
            position: absolute;
            right: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 1.3rem;
            color: #4797cf;
            opacity: 0.6;
            text-shadow: 0 0 5px #a3d0ff;
        }

        /* 查询按钮 */
        .query-btn {
            background: linear-gradient(115deg, #4797cf, #2d7eb3);
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1rem;
            width: 100%;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 1px 3px #0a2b40;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px -6px #236a99, 0 2px 4px #b1d6ff;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-top: 1.5rem;
        }

        .query-btn:hover {
            background: linear-gradient(115deg, #57a8e0, #388ac7);
            box-shadow: 0 14px 25px -5px #1e6fa3, 0 3px 8px #9cc9ff;
            transform: translateY(-3px);
            color: #f0f9ff;
        }

        .query-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 12px -2px #16639b;
        }

        /* 模糊查询提示标签 */
        .demo-hint {
            margin-top: 1.2rem;
            color: #2b5b7e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            border-top: 1px solid rgba(100, 170, 240, 0.3);
            padding-top: 1rem;
            margin-bottom: 0.8rem;
        }

        .mock-link {
            color: #195477;
            background: rgba(170, 215, 255, 0.45);
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            border: 1px solid rgba(70, 150, 230, 0.5);
            font-size: 0.8rem;
            transition: 0.1s;
            font-weight: 450;
            backdrop-filter: blur(2px);
            cursor: pointer;
        }

        .mock-link:hover {
            background: rgba(120, 190, 255, 0.5);
            border-color: #277bb5;
            color: #083952;
        }

 /* 功能按钮区域 - 基础样式保留，仅微调实现响应式布局 */
        .tool-buttons {
            display: flex;
            flex-wrap: wrap;           /* 核心：允许换行 */
            gap: 0.6rem;
            justify-content: space-between;
            margin: 0.5rem 0 1.2rem 0;
            width: 100%;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid #6ba6d9;
            border-radius: 40px;
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #134b66;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0, 30, 60, 0.1);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
            /* 去掉 flex:1 改成更自然的宽度分配，让一行放不下时自动折行 */
            flex: 1 1 auto;           
            min-width: 140px;          /* 每个按钮最小140px，大屏幕下一行正好放四个，小屏幕超宽则折行 */
            justify-content: center;
        }

        /* 大屏幕下（≥600px）希望保持一行，可以通过调整 min-width 来实现，如果四个最小宽度总和小于容器宽度则一行 */
        /* 也可以用max-width来限制，但当前设计已经符合：四个按钮min-width=560px, 容器950px>560px, 所以大屏幕一行显示。 */
        /* 如果需要强制小屏幕两行，大屏一行，现有flex-wrap+min-width完美达成：宽屏四个并排，窄屏每个至少140，放不下两个就换行 */

        /* 更精细控制：若希望更宽松时仍然一行，增加媒体查询微调（可保留） */
        @media (min-width: 700px) {
            .tool-btn {
                min-width: 150px;       /* 保证四个按钮占600+，但950宽度仍然够 */
            }
        }

        .tool-btn:hover {
            background: rgba(100, 170, 240, 0.25);
            border-color: #4797cf;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(30, 100, 160, 0.15);
        }

        .tool-btn:active {
            transform: translateY(0);
        }

        .tool-btn span {
            font-size: 1rem;
        }

        /* 加载状态 */
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(100, 170, 240, 0.3);
            border-radius: 50%;
            border-top-color: #4797cf;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        hr {
            border: 0.5px solid rgba(80, 150, 220, 0.3);
            margin: 0.6rem 0;
        }

        .footer-note {
            text-align: right;
            font-size: 0.7rem;
            color: #6589a8;
            margin-top: -0.1rem;
        }

        /* ---------- 弹出框 (模态框) 样式 ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(20, 40, 60, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: rgba(245, 250, 255, 0.95);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 950px;
            max-height: 85vh;
            border-radius: 2.5rem;
            border: 1px solid rgba(100, 180, 255, 0.5);
            box-shadow: 0 30px 50px rgba(0, 30, 60, 0.4);
            padding: 2rem 2rem;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }

        .modal-overlay.show .modal-container {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(70, 150, 230, 0.3);
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 600;
            color: #134b66;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-close {
            background: rgba(200, 225, 255, 0.5);
            border: 1px solid #7bb0d9;
            color: #1f5f83;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: rgba(100, 170, 240, 0.5);
            color: #083952;
            transform: rotate(90deg);
        }

        .modal-body {
            overflow-y: auto;
            padding: 0.5rem 0.5rem 1.2rem 0.5rem;
            max-height: 55vh;
            scrollbar-width: thin;
            scrollbar-color: #7bb0d9 #d9eaff;
        }

        .modal-body::-webkit-scrollbar {
            width: 8px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: #d9eaff;
            border-radius: 10px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: #7bb0d9;
            border-radius: 10px;
        }

        /* 结果卡片 */
        .modal-game-card {
            background: white;
            border-radius: 1.8rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            border: 1px solid rgba(70, 150, 230, 0.3);
            box-shadow: 0 4px 12px rgba(0, 30, 50, 0.05);
            transition: 0.1s;
        }
        .modal-game-card:hover {
            border-color: #4797cf;
            box-shadow: 0 6px 14px rgba(30, 100, 160, 0.1);
        }

        .modal-game-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #134b66;
            min-width: 130px;
            width:100%
        }

        .modal-qr-group {
            display: flex;
            gap: 0.1rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .modal-qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-qr-item:hover {
            transform: scale(1.05);
        }

        .qr-code-box {
            width: 55px;
            height: 55px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(60, 140, 210, 0.4);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            font-size: 0.7rem;
            color: #236a99;
            font-weight: 500;
            padding: 0.2rem;
            text-align: center;
            line-height: 1.2;
            position: relative;
            overflow: hidden;
        }

        .qr-canvas {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-canvas canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        .qr-label {
            font-size: 0.65rem;
            color: #1b5b7a;
            background: rgba(100, 170, 240, 0.1);
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            white-space: nowrap;
            font-weight: 500;
        }

        /* 分页控件 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(70, 150, 230, 0.2);
        }

        .page-btn {
            background: rgba(170, 215, 255, 0.7);
            border: 1px solid #6ba6d9;
            color: #1a5777;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: #4797cf;
            color: white;
            border-color: #2d7eb3;
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #b0cbe5;
        }

        .page-info {
            color: #1f5f83;
            font-size: 0.8rem;
            min-width: 140px;
            text-align: center;
            font-weight: 500;
            background: rgba(255,255,255,0.4);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        .empty-modal-msg {
            text-align: center;
            padding: 2.5rem;
            color: #6589a8;
            font-size: 1.1rem;
            background: rgba(220, 240, 255, 0.5);
            border-radius: 2.5rem;
        }

        /* 工具内容样式 */
        .tool-content {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(70, 150, 230, 0.3);
            box-shadow: 0 4px 12px rgba(0, 30, 50, 0.05);
        }

        .tool-content h3 {
            color: #134b66;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            border-bottom: 2px solid rgba(70, 150, 230, 0.2);
            padding-bottom: 0.4rem;
        }

        .tool-content p {
            color: #1f5f83;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 0.8rem;
        }

        .tool-content ul {
            list-style: none;
            padding: 0;
        }

        .tool-content li {
            color: #1b5b7a;
            font-size: 0.95rem;
            padding: 0.4rem 0;
            border-bottom: 1px dashed rgba(70, 150, 230, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tool-content li:before {
            content: "📦";
            font-size: 1.1rem;
        }

        .qr-mini-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.2rem;
            justify-content: center;
        }

        /* 捐赠区域样式 */
        .donate-content {
            text-align: center;
        }
        .donate-qr {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .donate-item {
            text-align: center;
        }
        .donate-item .qr-code-box {
            width: 120px;
            height: 120px;
            margin-bottom: 0.5rem;
        }
        .Dict {
            /* 默认隐藏 */
            display: none;
        }
        .long-press-hint {
            font-size: 0.7rem;
            color: #2b8dcc;
            margin-top: 0.2rem;
            opacity: 0.8;
            background: rgba(200,230,255,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .pc {
            font-size: 0.7rem;
            color: #2b8dcc;
            margin-top: 0.2rem;
            opacity: 0.8;
            background: rgba(200,230,255,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        /* 移动端显示：触摸设备 或 小屏幕设备 */
        @media (hover: none) and (pointer: coarse), (max-width: 768px) {
            .Dict {
                display: inline-block;
            }
            .pc {
                display: none;
            }
        }
        /* ---------- 新增：二维码放大专用模态框 (更高层级) ---------- */
        .zoom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 40, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s ease;
        }
        .zoom-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .zoom-modal-container {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.8rem 1.8rem 1.5rem 1.8rem;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 35px 60px rgba(0, 25, 50, 0.6);
            border: 1px solid rgba(100, 180, 255, 0.6);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s;
        }
        .zoom-modal-overlay.show .zoom-modal-container {
            transform: scale(1);
        }
        .zoom-close {
            position: absolute;
            top: 0.8rem;
            right: 1.2rem;
            font-size: 1rem;
            color: #2b5f88;
            cursor: pointer;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(200,225,255,0.7);
            transition: 0.2s;
            border: 1px solid #a0c8e8;
        }
        .zoom-close:hover {
            background: #4797cf;
            color: white;
            transform: rotate(90deg);
        }
        .zoom-qr-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0 1rem 0;

<script>
const toastEl = document.getElementById('toast');
const toastText = document.getElementById('toastText');
function showToast(message, isSuccess = true) {
    toastText.innerText = message;
    toastEl.classList.remove('success', 'error');
    toastEl.classList.add(isSuccess ? 'success' : 'error', 'show');
    setTimeout(() => {
        toastEl.classList.remove('show');
    }, 2500);
}
// 弹出框JavaScript
function showSimpleModal(message, onConfirm) {
    const modal = document.getElementById('simpleModal');
    const messageEl = document.getElementById('simpleModalMessage');
    const confirmBtn = document.getElementById('simpleModalConfirm');
    
    // 设置消息内容
    messageEl.textContent = message;
    
    // 显示弹出框
    modal.classList.add('show');
    
    // 移除旧的事件监听器（避免重复绑定）
    const newConfirmBtn = confirmBtn.cloneNode(true);
    confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
    
    // 绑定确定按钮事件
    newConfirmBtn.addEventListener('click', function() {
        modal.classList.remove('show');
        if (onConfirm && typeof onConfirm === 'function') {
            onConfirm();
        }
    });
    
    // 点击背景关闭（可选）
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            modal.classList.remove('show');
            if (onConfirm && typeof onConfirm === 'function') {
                onConfirm();
            }
        }
    });
}

let currentUser = null;  // { id, nickname, email }
// 初始化检查localstorage中的用户
function loadStoredUser() {
    const stored = localStorage.getItem('game_user');
    if(stored) {
        try{
            currentUser = JSON.parse(stored);
            updateAuthUI();
        }catch(e){}
    }else{
        updateAuthUI();
    }
}

function updateAuthUI() {
    const authArea = document.getElementById('authArea');
    if(currentUser && currentUser.nickname) {
        authArea.innerHTML = `<div class="user-info"><span class="user-nick">😀${currentUser.nickname}</span><button class="logout-btn" id="logoutBtn">退出</button></div>`;
        const logoutBtn = document.getElementById('logoutBtn');
        document.getElementById('loginToken').value = currentUser.loginToken;
        if(logoutBtn) logoutBtn.addEventListener('click', (e) => { logout(); });
    } else {
        authArea.innerHTML = `<button class="login-btn-header" id="openLoginModalBtn">🔐 登录 / 注册</button>`;
        const openBtn = document.getElementById('openLoginModalBtn');
        if(openBtn) openBtn.addEventListener('click', () => showAuthModal('login'));
    }
}

function logout() {
    currentUser = null;
    localStorage.removeItem('game_user');
    updateAuthUI();
    showSimpleModal('您已经注销成功。', function() {
    });
}

function showAuthModal(mode = 'login') {
    const modal = document.getElementById('authModal');
    const titleEl = document.getElementById('authModalTitle');
    const container = document.getElementById('authFormContainer');
    if(mode === 'login') {
        titleEl.innerText = '登录账号';
        container.innerHTML = `
            <div class="form-group"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
            <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="密码"></div>
            <button class="auth-btn" id="submitLoginBtn">登录</button>
            <div class="switch-auth" id="switchToReg">没有账号？ 立即注册</div>
            <div id="authError" class="error-msg"></div>
        `;
        document.getElementById('submitLoginBtn')?.addEventListener('click', handleLogin);
        document.getElementById('switchToReg')?.addEventListener('click', () => showAuthModal('register'));
    } else {
        titleEl.innerText = '注册账号';
        container.innerHTML = `
            <div class="form-group"><label>昵称</label><input type="text" id="regNickname" placeholder="昵称"></div>
            <div class="form-group"><label>邮箱</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
            <div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="密码"></div>
            <button class="auth-btn" id="submitRegBtn">注册</button>
            <div class="switch-auth" id="switchToLogin">已有账号？ 去登录</div>
            <div id="authError" class="error-msg"></div>
        `;
        document.getElementById('submitRegBtn')?.addEventListener('click', handleRegister);
        document.getElementById('switchToLogin')?.addEventListener('click', () => showAuthModal('login'));
    }
    modal.classList.add('show');
}

function closeAuthModal() { 
    document.getElementById('authModal').classList.remove('show'); 
}

// 登录接口调用
function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value.trim();
    
    if(!email || !pwd) { 
        showAuthError('请填写完整'); 
        return; 
    }
    
    // 显示加载状态
    const loginBtn = document.getElementById('submitLoginBtn');
    const originalText = loginBtn.innerText;
    loginBtn.innerText = '登录中...';
    loginBtn.disabled = true;
    
    fetch('api.php?method=login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            email: email,
            password: pwd
        })
    })
    .then(response => response.json())
    .then(data => {
        if(data.code == 0) {
            // 登录成功，存储用户信息
            currentUser = {
                id: data.data.id,
                nickname: data.data.nickname,
                email: data.data.email,
                loginToken: data.data.loginToken
            };
            localStorage.setItem('game_user', JSON.stringify(currentUser));
            updateAuthUI();
            closeAuthModal();
            showSimpleModal(`欢迎回来，${currentUser.nickname}`, function() {});
        } else {
            showSimpleModal(data.message || '邮箱或密码错误', function() {});
        }
    })
    .catch(error => {
        console.error('登录请求失败:', error);
        showAuthError('网络错误，请稍后重试');
    })
    .finally(() => {
        loginBtn.innerText = originalText;
        loginBtn.disabled = false;
    });
}

// 注册接口调用
function handleRegister() {
    const nickname = document.getElementById('regNickname').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pwd = document.getElementById('regPassword').value.trim();
    
    if(!nickname || !email || !pwd) { 
        showAuthError('请填写完整信息'); 
        return; 
    }
    
    // 显示加载状态
    const regBtn = document.getElementById('submitRegBtn');
    const originalText = regBtn.innerText;
    regBtn.innerText = '注册中...';
    regBtn.disabled = true;
    
    fetch('api.php?method=reg', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            nickname: nickname,
            email: email,
            password: pwd
        })
    })
    .then(response => response.json())
    .then(data => {
        if(data.code == 0) {
            // 注册成功，自动登录
            currentUser = {
                id: data.data.id,
                nickname: data.data.nickname,
                email: data.data.email,
                loginToken: data.data.loginToken
            };
            localStorage.setItem('game_user', JSON.stringify(currentUser));
            updateAuthUI();
            closeAuthModal();
            showSimpleModal('注册成功，已自动登录', function() {
            });
        }
        else {
            showAuthError(data.message || '注册失败，请重试');
        }
    })
    .catch(error => {
        console.error('注册请求失败:', error);
        showAuthError('网络错误，请稍后重试');
    })
    .finally(() => {
        regBtn.innerText = originalText;
        regBtn.disabled = false;
    });
}

function showAuthError(msg) {
    const errDiv = document.getElementById('authError');
    if(errDiv) {
        errDiv.innerText = msg;
        setTimeout(() => {
            if(errDiv) errDiv.innerText = '';
        }, 2000);
    }
}

// 原有游戏查询API (保留)
async function mockBackendAPI(query, page) {
    const formData = new FormData();
    formData.append('query', query.toLowerCase());
    formData.append('page', page);
    const tokenInput = document.getElementById('token');
    if(tokenInput) formData.append('token', tokenInput.value);
    try {
        const response = await fetch('api.php?method=list', { method: 'POST', body: formData });
        const data = await response.json();
        return { data: data.data || [], total: data.total || 0, page, totalPages: data.totalPages || 1 };
    } catch (error) {
        console.warn('模拟降级数据');
        return { data: [], total: 0, page: 1, totalPages: 1 };
    }
}

// 许愿池请求 (必须登录后发送token，后端需校验)
async function fetchWishes(page) {
    const formData = new FormData();
    formData.append('page', page);
    formData.append('loginToken', document.getElementById('loginToken').value);
    if(document.getElementById('token')) formData.append('token', document.getElementById('token').value);
    try {
        const response = await fetch('api.php?method=wish_list', { method: 'POST', body: formData });
        const data = await response.json();
        return { data: data.data || [], total: data.total || 0, page, totalPages: data.totalPages || 1 };
    } catch(e){ return { data: [], total:0, page:1, totalPages:1 }; }
}
async function createWish(text) {
    const formData = new FormData();
    formData.append('text', text);
    formData.append('loginToken', document.getElementById('loginToken').value);
    if(document.getElementById('token')) formData.append('token', document.getElementById('token').value);
    try{
        const res = await fetch('api.php?method=wish_create', { method: 'POST', body: formData });
        return await res.json();
    }catch(e){ return {code:1}; }
}
async function renderWishModal(page=1) {
    document.getElementById('download-tip').style.display = 'none';
    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="loading-spinner"></div>加载愿望...</div>`;
    const result = await fetchWishes(page);
    const wishes = result.data;
    wishCurrentPage = result.page;
    wishTotalPages = result.totalPages;
    wishTotal = result.total;
    let wishItems = '';
    if(!wishes.length) wishItems = '<div class="wish-empty">✨ 还没有愿望，快许下第一个愿望吧</div>';
    else {
        wishes.forEach(w => {
            wishItems += `<div class="wish-item"><div class="wish-text">💬 ${w.text}</div>${w.reply ? `<div class="wish-reply">📢 回复：${w.reply}</div>` : ''}<div class="wish-time" style="font-size:0.7rem;color:#6589a8;">${w.time || ''}</div></div>`;
        });
    }
    const formHtml = `<div class="wish-form"><input class="wish-input" id="newWishInput" placeholder="许下心愿，例如：求星之卡比..." style="flex:1; padding:0.6rem; border-radius:40px; border:1px solid #b3d6f0;"><button class="wish-submit-btn" id="submitWishBtn" style="background:#4797cf; border:none; border-radius:40px; padding:0.6rem 1rem;">✨ 许愿</button></div>`;
    modalBody.innerHTML = `${formHtml}<div class="wish-list">${wishItems}</div>`;
    document.getElementById('submitWishBtn')?.addEventListener('click', async () => {
        if(!currentUser) { alert('您未登录，请先登录'); closeResultModal(); showAuthModal('login'); return; }
        const input = document.getElementById('newWishInput');
        const txt = input.value.trim();
        if(txt.length<2) { alert('愿望至少2个字'); return; }
        const res = await createWish(txt);
        if(res.code == 0) { alert('许愿成功！'); input.value=''; await renderWishModal(wishCurrentPage); }
        else alert('许愿失败，请稍后再试');
    });
    document.getElementById('pageInfo').innerText = `第 ${wishCurrentPage}/${wishTotalPages} 页 (共${wishTotal}条)`;
    document.getElementById('prevPage').disabled = wishCurrentPage <= 1;
    document.getElementById('nextPage').disabled = wishCurrentPage >= wishTotalPages;
    document.getElementById('pagination').style.display = 'flex';
}
// 游戏渲染函数沿用原有样式，省略二维码监听等（保持原有风格）
async function loadGamePage(page) {
    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="loading-spinner"></div>加载游戏...</div>`;
    const res = await mockBackendAPI(currentGameQuery, page);
    gameCurrentPage = res.page; gameTotalPages = res.totalPages; gameTotalCount = res.total;
    modalBody.innerHTML = generateGameCards(res.data);
    for(let i=0;i<res.data.length;i++){
        const g = res.data[i];
        const baiduDiv = document.getElementById(`baidu-qr-${i}`);
        if(baiduDiv && g.baiduLink) await generateQRCode(baiduDiv, g.baiduLink);
        const quarkDiv = document.getElementById(`quark-qr-${i}`);
        if(quarkDiv && g.quarkLink) await generateQRCode(quarkDiv, g.quarkLink);
        if(g.xunleiLink) { const xunleiDiv = document.getElementById(`xunlei-qr-${i}`); if(xunleiDiv) await generateQRCode(xunleiDiv, g.xunleiLink); }
    }
    attachQrZoom();
    document.getElementById('pageInfo').innerText = `第 ${gameCurrentPage}/${gameTotalPages} 页 (共${gameTotalCount}个)`;
    document.getElementById('prevPage').disabled = gameCurrentPage <= 1;
    document.getElementById('nextPage').disabled = gameCurrentPage >= gameTotalPages;
    document.getElementById('pagination').style.display = 'flex';
    document.getElementById('download-tip').style.display = 'flex';
}
function generateGameCards(games){
    if(!games.length) return '<div class="empty-modal-msg">🔍 未找到游戏</div>';
    let html='';
    games.forEach((g,i)=>{
        html += `<div class="modal-game-card"><div>${g.name}</div><div class="modal-qr-group" style="display:flex; gap:0.5rem;"><div class="modal-qr-item" data-link="${g.baiduLink}" data-platform="百度网盘（提取码：8888）"><div class="qr-code-box" id="baidu-qr-${i}"></div><span>百度</span></div><div class="modal-qr-item" data-link="${g.quarkLink}" data-platform="夸克网盘"><div class="qr-code-box" id="quark-qr-${i}"></div><span>夸克</span></div>${g.xunleiLink?`<div class="modal-qr-item" data-link="${g.xunleiLink}" data-platform="迅雷网盘"><div class="qr-code-box" id="xunlei-qr-${i}"></div><span>迅雷</span></div>`:''}</div></div>`;
    });
    return html;
}
// ==================== QR码生成 ====================
async function generateQRCode(container, text) {
    if (!text) {
        container.innerHTML = '无';
        return;
    }
    
    container.innerHTML = '';
    const canvas = document.createElement('canvas');
    canvas.style.width = '100%';
    await QRCode.toCanvas(canvas, text, { width: 50 });
    container.appendChild(canvas);
}

// ==================== QR码放大功能 ====================
function attachQrZoom() {
    document.querySelectorAll('.modal-qr-item').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            const link = el.dataset.link;
            const platform = el.dataset.platform;
            if (link) {
                showZoom(platform, link);
            }
        });
    });
}

function showZoom(platform, link) {
    const zoomBox = document.getElementById('zoomQrBox');
    zoomBox.innerHTML = '';
    
    QRCode.toCanvas(document.createElement('canvas'), link, { width: 200 }, (err, canvas) => {
        if (canvas) {
            canvas.style.width = '100%';
            zoomBox.appendChild(canvas);
        }
    });
    
    document.getElementById('zoomPlatform').innerText = platform;
    document.getElementById('zoomModal').classList.add('show');
    window.currentZoomLink = link;
}

function closeZoom() {
    document.getElementById('zoomModal').classList.remove('show');
}

    if (currentMode === 'game' && gameCurrentPage > 1) {
        loadGamePage(gameCurrentPage - 1);

        renderWishModal(wishCurrentPage - 1);

function handleNextPage() {
    if (currentMode === 'game' && gameCurrentPage < gameTotalPages) {
        loadGamePage(gameCurrentPage + 1);
    } else if (currentMode === 'wish' && wishCurrentPage < wishTotalPages) {
        renderWishModal(wishCurrentPage + 1);
    }
}

// ==================== 事件绑定初始化 ====================
function bindEvents() {
    // 搜索
    document.getElementById('searchBtn').addEventListener('click', handleSearch);
    
    // 弹窗关闭
    document.getElementById('closeModalBtn').addEventListener('click', closeResultModal);
    document.getElementById('closeAuthModalBtn').addEventListener('click', closeAuthModal);
    document.getElementById('closeZoomBtn').addEventListener('click', closeZoom);
    
    // 分页
    document.getElementById('prevPage').addEventListener('click', handlePrevPage);
    document.getElementById('nextPage').addEventListener('click', handleNextPage);
    
    // 二维码放大弹窗操作
    document.getElementById('jumpDirectBtn')?.addEventListener('click', () => jumpToLink(window.currentZoomLink));
    document.getElementById('copyDirectBtn')?.addEventListener('click', () => copyLinkToClipboard(window.currentZoomLink));
    
    // 愿望单
    document.getElementById('wishingWellBtn').addEventListener('click', handleWishClickWithAuth);
    
    // 工具按钮
    for (const [btnId, config] of Object.entries(toolButtons)) {
        document.getElementById(btnId).onclick = () => openToolModal(config.title, config.content);
    }
    
    // 模拟链接
    document.querySelectorAll('.mock-link').forEach(el => {
        el.addEventListener('click', () => {
            document.getElementById('gameSearchInput').value = el.innerText;
            document.getElementById('searchBtn').click();
        });
    });
}

// ==================== 初始化 ====================
loadStoredUser();
bindEvents();
