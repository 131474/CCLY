<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮游戏宝库🎮</title>
    <style>
        /* ========== 全局防模糊优化 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #dde9f5 0%, #c7d9e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-touch-callout: none;
            user-select: none;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-slideshow .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .bg-slideshow .slide.active {
            opacity: 1;
        }
        .query-card {
            width: 100%;
            max-width: 950px;
            background: transparent;
            border: 1px solid rgba(160, 200, 240, 0.4);
            border-radius: 2.5rem;
            padding: 2.2rem 2rem 1.8rem 2rem;
            box-shadow: 0 25px 40px -20px rgba(30, 60, 90, 0.3), 0 10px 20px -5px rgba(140, 200, 255, 0.2), inset 0 1px 3px #ffffffcc;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            z-index: 1;
            backface-visibility: hidden;
            transform: scale(1);
        }
        .query-card:hover {
            transform: scale(1.005);
            border-color: rgba(80, 160, 240, 0.7);
            box-shadow: 0 30px 45px -15px #2b4f6e40, 0 0 0 2px rgba(100, 180, 255, 0.2);
        }
        .query-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 250, 255, 0.92);
            border-radius: inherit;
            z-index: -1;
            pointer-events: none;
            transition: background 0.2s;
        }
        .query-card:hover::before {
            background: rgba(245, 250, 255, 0.96);
        }
        .query-card > * {
            position: relative;
            z-index: 1;
        }
        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .game-house {
            font-size: 1.95rem;
            font-weight: 800;
            background: linear-gradient(130deg, #1f6d8f, #1b5b7a, #134b66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px rgba(70, 160, 220, 0.3);
            line-height: 1.2;
        }
        .header-right {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: nowrap;
        }
        .publisher-line {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.1rem;
            margin-bottom: 1.8rem;
            color: #2f5570;
            font-size: 1rem;
            border-left: 3px solid #3f9ad0;
            padding-left: 1rem;
        }
        .publisher-icon {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 3px #6bb0e6);
        }
        .publisher-name {
            font-weight: 600;
            color: #1e4863;
        }
        .search-hint {
            color: #215674;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            padding: 0.3rem 0 0.2rem 0;
            border-bottom: 1px dashed rgba(70, 140, 210, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .hint-bold {
            font-weight: 600;
            color: #1b6c9c;
        }
        .input-wrapper {
            position: relative;
            width: 100%;
            margin: 0.5rem 0 1rem 0;
        }
        .game-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #b3d6f0;
            border-radius: 60px;
            padding: 1.1rem 1.8rem;
            font-size: 1.2rem;
            color: #103f5c;
            caret-color: #2b8dcc;
            outline: none;
            transition: all 0.25s;
            box-shadow: inset 0 4px 8px rgba(0, 20, 40, 0.02), 0 2px 4px #c9e2ff;
            font-weight: 500;
        }
        .game-input::placeholder {
            color: #7096b5;
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.8;
        }
        .game-input:focus {
            border-color: #3895d6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(70, 160, 255, 0.25), inset 0 2px 5px #d9ecff;
        }
        .input-emoji-decoration {
            position: absolute;
            right: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 1.3rem;
            color: #4797cf;
            opacity: 0.6;
        }
        .query-btn {
            background: linear-gradient(115deg, #4797cf, #2d7eb3);
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1rem;
            width: 100%;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 1px 3px #0a2b40;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px -6px #236a99, 0 2px 4px #b1d6ff;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-top: 1.5rem;
        }
        .query-btn:hover {
            background: linear-gradient(115deg, #57a8e0, #388ac7);
            box-shadow: 0 14px 25px -5px #1e6fa3, 0 3px 8px #9cc9ff;
            transform: translateY(-2px);
        }
        .query-btn:active {
            transform: translateY(1px);
        }
        .demo-hint {
            margin-top: 1rem;
            color: #2b5b7e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            padding-top: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .mock-link {
            color: #195477;
            background: rgba(170, 215, 255, 0.6);
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            border: 1px solid rgba(70, 150, 230, 0.5);
            font-size: 0.8rem;
            transition: all 0.1s;
            font-weight: 500;
            cursor: pointer;
        }
        .mock-link:hover {
            background: rgba(120, 190, 255, 0.7);
            border-color: #277bb5;
            color: #083952;
            transform: translateY(-1px);
        }
        .tool-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: space-between;
            margin: 0.5rem 0 1.2rem 0;
            width: 100%;
        }
        .tool-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid #6ba6d9;
            border-radius: 40px;
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #134b66;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0, 30, 60, 0.1);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
            flex: 1 1 auto;
            min-width: 140px;
            justify-content: center;
        }
        .tool-btn:hover {
            background: rgba(100, 170, 240, 0.4);
            border-color: #4797cf;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(30, 100, 160, 0.2);
        }
        #todayUpdateBtn {
            background: linear-gradient(115deg, #ff9a3c, #ff6a1a);
            border-color: #ff8c42;
            animation: pulse 1.5s infinite;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 100, 0, 0.6); }
            70% { box-shadow: 0 0 0 6px rgba(255, 100, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 100, 0, 0); }
        }
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(100, 170, 240, 0.3);
            border-radius: 50%;
            border-top-color: #4797cf;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        hr {
            border: 0.5px solid rgba(80, 150, 220, 0.3);
            margin: 0.6rem 0;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #6589a8;
            margin-top: 0.2rem;
            line-height: 1.3;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(20, 40, 60, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: rgba(245, 250, 255, 0.98);
            backdrop-filter: blur(8px);
            width: 90%;
            max-width: 950px;
            max-height: 85vh;
            border-radius: 2.5rem;
            border: 1px solid rgba(100, 180, 255, 0.5);
            box-shadow: 0 30px 50px rgba(0, 30, 60, 0.4);
            padding: 2rem 2rem;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        .modal-overlay.show .modal-container {
            transform: scale(1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(70, 150, 230, 0.3);
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #134b66;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .result-count {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff6a1a;
            background: rgba(255, 106, 26, 0.15);
            padding: 0.1rem 0.4rem;
            border-radius: 30px;
            margin-left: 0.2rem;
        }
        .modal-close {
            background: rgba(200, 225, 255, 0.5);
            border: 1px solid #7bb0d9;
            color: #1f5f83;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover {
            background: rgba(100, 170, 240, 0.5);
            color: #083952;
            transform: rotate(90deg);
        }
        .modal-body {
            overflow-y: auto;
            padding: 0.5rem 0.5rem 1.2rem 0.5rem;
            max-height: 55vh;
            scrollbar-width: thin;
        }
        .modal-game-card {
            background: white;
            border-radius: 1.8rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(70, 150, 230, 0.3);
            box-shadow: 0 4px 12px rgba(0, 30, 50, 0.05);
            transition: box-shadow 0.1s;
        }
        .modal-game-card:hover {
            border-color: #4797cf;
            box-shadow: 0 6px 14px rgba(30, 100, 160, 0.1);
        }
        .game-title-row {
            font-weight: 700;
            font-size: 1.1rem;
            color: #134b66;
            margin-bottom: 0.8rem;
            border-left: 4px solid #4797cf;
            padding-left: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .update-date {
            font-size: 0.8rem;
            color: #1e88e5;
            background: rgba(30, 136, 229, 0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }
        .modal-qr-group {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        .modal-qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            cursor: pointer;
            transition: transform 0.1s;
            background: rgba(245, 250, 255, 0.6);
            padding: 0.2rem 0.4rem;
            border-radius: 1rem;
            min-width: 55px;
        }
        .modal-qr-item:hover {
            transform: scale(1.02);
            background: rgba(200, 225, 255, 0.8);
        }
        .qr-code-box {
            width: 55px;
            height: 55px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(60, 140, 210, 0.4);
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .qr-code-box canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
        .qr-label {
            font-size: 0.7rem;
            color: #1b5b7a;
            background: rgba(100, 170, 240, 0.1);
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-weight: 500;
        }
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(70, 150, 230, 0.2);
        }
        .page-btn {
            background: rgba(170, 215, 255, 0.7);
            border: 1px solid #6ba6d9;
            color: #1a5777;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: #4797cf;
            color: white;
            border-color: #2d7eb3;
            transform: translateY(-1px);
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #b0cbe5;
        }
        .page-info {
            color: #1f5f83;
            font-size: 0.8rem;
            min-width: 140px;
            text-align: center;
            font-weight: 500;
            background: rgba(255,255,255,0.4);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }
        .empty-modal-msg {
            text-align: center;
            padding: 2.5rem;
            color: #6589a8;
            font-size: 1.1rem;
            background: rgba(220, 240, 255, 0.5);
            border-radius: 2.5rem;
        }
        .tool-content {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(70, 150, 230, 0.3);
        }
        .tool-content h3 {
            color: #134b66;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            border-bottom: 2px solid rgba(70, 150, 230, 0.2);
            padding-bottom: 0.4rem;
        }
        .tool-content p {
            color: #1f5f83;
            font-size: 1rem;
            line-height: 1.5;
        }
        .hot-section {
            margin: 1rem 0 0.5rem;
        }
        .hot-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a5777;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .hot-title::before {
            content: "🔥";
            font-size: 1.2rem;
        }
        .hot-scroll {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }
        .hot-item {
            flex: 0 0 auto;
            width: 80px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .hot-item:hover {
            transform: translateY(-2px);
        }
        .hot-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 16px;
            background: #f0f0f0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            image-rendering: auto;
        }
        .hot-item span {
            display: block;
            font-size: 0.75rem;
            margin-top: 0.3rem;
            color: #1a5777;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .Dict { display: none; }
        .pc { font-size: 0.7rem; color: #2b8dcc; margin-top: 0.2rem; }
        @media (hover: none) and (pointer: coarse), (max-width: 768px) {
            .Dict { display: inline-block; }
            .pc { display: none; }
        }
        .zoom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 40, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s ease;
        }
        .zoom-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .zoom-modal-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.8rem 1.8rem 1.5rem 1.8rem;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 35px 60px rgba(0, 25, 50, 0.6);
            border: 1px solid rgba(100, 180, 255, 0.6);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s;
            position: relative;
        }
        .zoom-modal-overlay.show .zoom-modal-container {
            transform: scale(1);
        }
        .zoom-close {
            position: absolute;
            top: 0.8rem;
            right: 1.2rem;
            font-size: 1rem;
            color: #2b5f88;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(200,225,255,0.7);
            transition: 0.2s;
            border: 1px solid #a0c8e8;
        }
        .zoom-close:hover {
            background: #4797cf;
            color: white;
            transform: rotate(90deg);
        }
        .zoom-qr-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0 1rem 0;
        }
        .zoom-qr-box {
            width: 240px;
            height: 240px;
            background: white;
            border: 3px solid rgba(60, 140, 210, 0.4);
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(0, 40, 70, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .zoom-qr-box canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
        .zoom-platform {
            font-size: 1.2rem;
            font-weight: 600;
            color: #134b66;
            margin-top: 0.2rem;
            background: rgba(100, 170, 240, 0.1);
            padding: 0.3rem 1.8rem;
            border-radius: 40px;
            display: inline-block;
        }
        .zoom-link-hint {
            font-size: 0.75rem;
            color: #6589a8;
            margin-top: 0.5rem;
            word-break: break-all;
            max-width: 260px;
        }
        .download-tip {
            font-size: 0.8rem;
            color: #2b8dcc;
            margin-top: 0.1rem;
            opacity: 0.8;
            background: rgba(200,230,255,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .wish-list { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1rem; }
        .wish-item { background: rgba(255,255,255,0.8); border-radius: 2rem; padding: 1rem 1.5rem; border: 1px solid #b3d6f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .wish-text { font-size: 1rem; color: #134b66; flex: 1; }
        .wish-time { font-size: 0.8rem; color: #6589a8; margin-left: 1rem; }
        .wish-reply { margin-top: 0.3rem; font-size: 0.85rem; color: #236a99; border-left: 3px solid #9ac9f0; padding-left: 0.8rem; }
        .wish-form { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; background: rgba(200,225,255,0.3); padding: 1.5rem; border-radius: 2rem; border: 1px dashed #6ba6d9; }
        .wish-input { flex: 3; min-width: 200px; background: white; border: 2px solid #b3d6f0; border-radius: 40px; padding: 0.8rem 1.5rem; font-size: 1rem; outline: none; }
        .wish-input:focus { border-color: #3895d6; box-shadow: 0 0 0 3px rgba(70,160,255,0.2); }

<script>
    // ==================== 游戏数据加载与更新检测 ====================
    let gameDB = [];
    let dataLoaded = false;

    // 存储游戏更新日期的 key (localStorage)
    const STORAGE_KEY = 'game_update_dates';
    // 存储上次游戏名称快照的 key (用于检测名称变化)
    const SNAPSHOT_KEY = 'game_name_snapshot';

    // 获取当天日期字符串 YYYY-MM-DD
    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // 更新游戏更新日期记录（基于新旧快照对比）
    function updateGameDates(newGames) {
        const today = getTodayStr();
        // 获取上次存储的快照（游戏名称数组）
        let lastSnapshot = [];
        try {
            const raw = localStorage.getItem(SNAPSHOT_KEY);
            if (raw) lastSnapshot = JSON.parse(raw);
        } catch(e) { console.warn(e); }
        
        // 获取现有日期记录
        let dateMap = {};
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) dateMap = JSON.parse(raw);
        } catch(e) { console.warn(e); }

        // 辅助：用名称查找上次快照中的索引
        function findInSnapshot(name, startIdx) {
            // 优先精确匹配
            let idx = lastSnapshot.indexOf(name);
            if (idx !== -1) return idx;
            // 若没有，则尝试按位置匹配（当数量相同时）
            if (startIdx !== undefined && startIdx < lastSnapshot.length && lastSnapshot[startIdx] === name) return startIdx;
            return -1;
        }

        // 构建新名称列表
        const newNames = newGames.map(g => g.name);
        // 记录本次需要保存的日期
        const newDateMap = {};

        // 遍历新游戏，确定更新日期
        for (let i = 0; i < newNames.length; i++) {
            const name = newNames[i];
            // 查找在上次快照中的位置
            let oldIdx = -1;
            // 先按索引匹配（如果索引存在且名称相同）
            if (i < lastSnapshot.length && lastSnapshot[i] === name) {
                oldIdx = i;
            } else {
                oldIdx = findInSnapshot(name, i);
            }
            
            if (oldIdx !== -1) {
                // 找到了旧记录，检查名称是否发生变化（名称相同则没变）
                const oldName = lastSnapshot[oldIdx];
                if (oldName === name) {
                    // 名称未变，保留原有日期
                    newDateMap[name] = dateMap[oldName] || '1970-01-01';
                } else {
                    // 名称改变了（即使只是标点），记录为今天
                    newDateMap[name] = today;
                }
            } else {
                // 没找到旧记录，视为新增游戏
                newDateMap[name] = today;
            }
        }

        // 保存新的日期映射和快照
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newDateMap));
        localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(newNames));
        return newDateMap;
    }

    // 获取今日更新的游戏数量及列表
    function getTodayUpdatedGames(gameList) {
        const today = getTodayStr();
        let dateMap = {};
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) dateMap = JSON.parse(raw);
        } catch(e) { console.warn(e); }

        const todayGames = [];
        for (const game of gameList) {
            const updateDate = dateMap[game.name];
            if (updateDate === today) {
                todayGames.push({ ...game, updateDate });
            }
        }
        // 按更新日期倒序（最新在前）
        todayGames.sort((a,b) => new Date(b.updateDate) - new Date(a.updateDate));
        return todayGames;
    }

    // 更新今日更新按钮的数字
    function updateTodayBadge() {
        if (!dataLoaded) return;
        const todayGames = getTodayUpdatedGames(gameDB);
        const count = todayGames.length;
        const badge = document.getElementById('todayBadge');
        if (badge) badge.innerText = `(${count})`;
    }

    // ==================== 加载游戏数据 ====================
    async function loadGameData() {
        try {
            const response = await fetch('games.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const newGames = await response.json();
            // 更新日期记录（基于名称变化）
            updateGameDates(newGames);
            gameDB = newGames;
            dataLoaded = true;
            console.log(`✅ 成功加载 ${gameDB.length} 个游戏`);
            renderHotGames();
            updateTodayBadge();  // 更新按钮数字
        } catch (error) {
            console.error('❌ 加载游戏数据失败：', error);
            gameDB = [];
            dataLoaded = true;
            alert('游戏数据加载失败，请检查网络或刷新页面重试');
        }
    }

    function renderHotGames() {
        const hotSection = document.getElementById('hotSection');
        const hotScroll = document.getElementById('hotScroll');
        if (!hotSection || !hotScroll) return;
        if (!gameDB.length) {
            hotSection.style.display = 'none';
            return;
        }
        const hotGames = gameDB.slice(0, 10);
        hotScroll.innerHTML = hotGames.map(game => {
            let displayName = game.shortName;
            if (!displayName) {
                const rawName = game.name;
                displayName = rawName.length > 5 ? rawName.slice(0,5) + '…' : rawName;
            }
            const coverUrl = game.cover ? game.cover : 'https://via.placeholder.com/80x80?text=🎮';
            return `
                <div class="hot-item" data-name="${escapeHtml(game.name)}">
                    <img src="${coverUrl}" alt="${escapeHtml(displayName)}" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80?text=🎮'">
                    <span>${escapeHtml(displayName)}</span>
                </div>
            `;
        }).join('');
        hotSection.style.display = 'block';

        document.querySelectorAll('.hot-item').forEach(item => {
            item.addEventListener('click', () => {
                const gameName = item.getAttribute('data-name');
                if (gameName) searchByKeyword(gameName);
            });
        });
    }

    async function searchByKeyword(keyword) {
        if (!dataLoaded) { alert('游戏数据还在加载中，请稍后再试'); return; }
        currentMode = 'game';
        currentGameQuery = keyword;
        openResultModal();
        await loadGamePage(1);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== 工具按钮内容 ====================
    const toolButtons = {

        nsMobileEmulatorBtn: {

                </div>
            `
        },
        atmosphereBtn: { title: '🌐 常用工具', content: '<div class="tool-content"><h3>实用工具</h3><p>模拟器、存档修改器等。</p><p>链接: https://pan.baidu.com/s/xxxx 提取码: 5678</p></div>' },
        exchangeBtn: { 
            title: '🐧 交流群',
            content: `
                <div class="tool-content" style="text-align: center;">
                    <h3 style="margin-bottom: 1rem;">📢 玩家交流群</h3>
                    <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;">
                        <div style="background: #f0f6ff; border-radius: 20px; padding: 1rem; width: 160px;">
                            <div style="font-size: 2rem;">🐧</div>
                            <div style="font-weight: bold; margin: 0.5rem 0;">QQ群</div>
                            <div style="color: #2b5f88; cursor: pointer;" id="qqNum">123456789</div>
                            <div style="font-size: 0.7rem; margin-top: 0.3rem;">点击复制</div>
                        </div>
                        <div style="background: #f0f6ff; border-radius: 20px; padding: 1rem; width: 160px;">
                            <div style="font-size: 2rem;">💬</div>
                            <div style="font-weight: bold; margin: 0.5rem 0;">微信群</div>
                            <div style="color: #2b5f88;">请加好友拉群</div>
                            <div style="font-size: 0.7rem; margin-top: 0.3rem;">扫码联系</div>

                    <p style="margin-top: 1rem; font-size: 0.8rem; color: #6589a8;">欢迎各位玩家加入交流~</p>
                </div>
            `
        },
        feedbackBtn: { 
            title: '💬 反馈问题',
            content: `
                <div class="tool-content">
                    <h3>📢 链接失效反馈</h3>
                    <p>如果您发现网盘链接失效，请填写以下信息，我们会尽快修复：</p>
                    <div class="form-group">
                        <label>失效的游戏名称（选填）</label>

                    </div>

                        <label>您的邮箱（选填，方便回复）</label>
                        <input type="email" id="feedbackEmail" placeholder="your@email.com">
                    </div>
                    <button id="submitFeedbackBtn" class="auth-btn">提交反馈</button>
                    <div id="feedbackResult" class="error-msg" style="margin-top:1rem;"></div>
                </div>
            `
        }
    };

    let currentUser = null;
    let wishCurrentPage = 1, wishTotalPages = 1, wishTotal = 0;
    let currentMode = 'game'; // 'game', 'wish', 'today'
    let currentGameQuery = '';
    let gameCurrentPage = 1, gameTotalPages = 1, gameTotalCount = 0;
    // 今日更新相关
    let todayGameList = [];
    let todayCurrentPage = 1, todayTotalPages = 1;
    const pageSize = 10;  // 每页10个

    // 检查 gameName 是否包含 query 的所有字符，且顺序一致（子序列）
    function matchesQuery(gameName, query) {
        const nameLower = gameName.toLowerCase();
        const queryLower = query.toLowerCase();
        let pos = -1;
        for (let i = 0; i < queryLower.length; i++) {
            const ch = queryLower[i];
            const nextPos = nameLower.indexOf(ch, pos + 1);
            if (nextPos === -1) return false;
            pos = nextPos;
        }
        return true;
    }

    // 排序函数：连续匹配优先，其次按第一个字符位置
    function calculateScore(gameName, query) {
        const nameLower = gameName.toLowerCase();
        const queryLower = query.toLowerCase();
        // 1. 连续匹配（完整子串）
        const contIdx = nameLower.indexOf(queryLower);
        if (contIdx !== -1) {
            return 100000 - contIdx * 10;
        }
        // 2. 不连续但顺序匹配：按第一个字符位置
        const firstIdx = nameLower.indexOf(queryLower[0]);
        if (firstIdx !== -1) {
            return 10000 - firstIdx * 10;
        }
        return 0;
    }

    async function mockBackendAPI(query, page) {
        if (!dataLoaded) return { data: [], total: 0, page: 1, totalPages: 1 };
        let filtered = gameDB.filter(g => matchesQuery(g.name, query));
        filtered.sort((a, b) => {
            const scoreA = calculateScore(a.name, query);
            const scoreB = calculateScore(b.name, query);
            return scoreB - scoreA;
        });
        const total = filtered.length;
        const totalPages = Math.ceil(total / pageSize);
        const start = (page - 1) * pageSize;
        const data = filtered.slice(start, start + pageSize);
        return { data: data, total: total, page: page, totalPages: totalPages };
    }

    async function fetchWishes(page) { return { data: [], total: 0, page: 1, totalPages: 1 }; }
    async function createWish(text) { return { code: 0 }; }

        const res = await mockBackendAPI(currentGameQuery, page);
        gameCurrentPage = res.page;
        gameTotalPages = res.totalPages;
        gameTotalCount = res.total;
        modalTitle.innerHTML = `🔍查询到 <span class="result-count">${gameTotalCount}</span> 个游戏`;
        modalBody.innerHTML = generateGameCards(res.data);
        for(let i=0; i<res.data.length; i++) {
            const game = res.data[i];
            for(let j=0; j<game.links.length; j++) {
                const container = document.getElementById(`qr-${i}-${j}`);
                if(container && game.links[j].url) await generateQRCode(container, game.links[j].url);
            }
        }
        attachQrZoom();
        document.getElementById('pageInfo').innerText = `第 ${gameCurrentPage}/${gameTotalPages} 页 (共${gameTotalCount}个)`;
        document.getElementById('prevPage').disabled = gameCurrentPage <= 1;
        document.getElementById('nextPage').disabled = gameCurrentPage >= gameTotalPages;
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('download-tip').style.display = 'flex';
    }

    function generateGameCards(games){
        if(!games.length) return '<div class="empty-modal-msg">🔍 未找到游戏</div>';
        let html = '';
        games.forEach((game, idx) => {
            html += `<div class="modal-game-card">
                        <div class="game-title-row">🎮 ${game.name} (${game.platform})</div>
                        <div class="modal-qr-group">`;
            game.links.forEach((link, linkIdx) => {
                html += `<div class="modal-qr-item" data-link="${link.url}" data-platform="${link.name}" data-code="${link.code || ''}">
                            <div class="qr-code-box" id="qr-${idx}-${linkIdx}"></div>
                            <span class="qr-label">${link.name}</span>
                         </div>`;
            });
            html += `</div></div>`;
        });
        return html;
    }

    async function generateQRCode(container, text) {
        if (!text) { container.innerHTML = '无'; return; }
        container.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        await QRCode.toCanvas(canvas, text, { width: 50 });
        container.appendChild(canvas);
    }

    function attachQrZoom() {
        document.querySelectorAll('.modal-qr-item').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const link = el.dataset.link;
                const platform = el.dataset.platform;
                if (link) showZoom(platform, link);
            });
        });
    }

    function showZoom(platform, link) {
        const zoomBox = document.getElementById('zoomQrBox');
        zoomBox.innerHTML = '';
        QRCode.toCanvas(document.createElement('canvas'), link, { width: 200 }, (err, canvas) => {
            if (canvas) { canvas.style.width = '100%'; zoomBox.appendChild(canvas); }
        });
        document.getElementById('zoomPlatform').innerText = platform;
        const pcHint = document.querySelector('.pc');
        if (pcHint) pcHint.innerText = `${platform}APP扫码获取`;
        document.getElementById('zoomModal').classList.add('show');
        window.currentZoomLink = link;
    }

    function closeZoom() { document.getElementById('zoomModal').classList.remove('show'); }
    function openResultModal() { document.getElementById('resultModal').classList.add('show'); }
    function closeResultModal() { 
        document.getElementById('resultModal').classList.remove('show');
        document.getElementById('pagination').style.display = 'flex';
    }

    async function handleSearch() {
        if (!dataLoaded) { alert('游戏数据还在加载中，请稍后再试'); return; }
        const query = document.getElementById('gameSearchInput').value.trim();
        if (!query) return;
        currentMode = 'game';
        currentGameQuery = query;
        openResultModal();
        await loadGamePage(1);
    }

    function handlePrevPage() {
        if (currentMode === 'game' && gameCurrentPage > 1) loadGamePage(gameCurrentPage - 1);
        else if (currentMode === 'wish' && wishCurrentPage > 1) renderWishModal(wishCurrentPage - 1);
        else if (currentMode === 'today' && todayCurrentPage > 1) renderTodayPage(todayCurrentPage - 1);
    }
    function handleNextPage() {
        if (currentMode === 'game' && gameCurrentPage < gameTotalPages) loadGamePage(gameCurrentPage + 1);
        else if (currentMode === 'wish' && wishCurrentPage < wishTotalPages) renderWishModal(wishCurrentPage + 1);
        else if (currentMode === 'today' && todayCurrentPage < todayTotalPages) renderTodayPage(todayCurrentPage + 1);
    }

    function openToolModal(title, content) {
        document.getElementById('pagination').style.display = 'none';
        document.getElementById('download-tip').style.display = 'none';
        currentMode = 'tool';
        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('modalBody').innerHTML = content;
        openResultModal();

        if (title === '📱 手机游戏') {
            const qrContainer = document.getElementById('mobileQrCode');
            if (qrContainer) {
                const downloadUrl = 'https://pan.quark.cn/s/xxxx'; // 请替换为真实下载链接
                qrContainer.innerHTML = '';
                const canvas = document.createElement('canvas');
                QRCode.toCanvas(canvas, downloadUrl, { width: 200 }, (err) => {
                    if (err) {
                        qrContainer.innerHTML = '<span style="color:red;">二维码生成失败</span>';
                    } else {
                        canvas.style.width = '200px';
                        canvas.style.height = '200px';
                        qrContainer.appendChild(canvas);
                    }
                });
            }
        }

        if (title === '🐧 交流群') {
            const qqNum = document.getElementById('qqNum');
            if (qqNum) {
                qqNum.addEventListener('click', () => {
                    const text = qqNum.innerText;
                    navigator.clipboard.writeText(text).then(() => {
                        alert('QQ群号已复制: ' + text);
                    }).catch(() => {
                        alert('复制失败，请手动复制');
                    });
                });
            }
        }

        if (title === '💬 反馈问题') {
            const submitBtn = document.getElementById('submitFeedbackBtn');
            if (submitBtn) {
                submitBtn.onclick = () => {
                    const game = document.getElementById('feedbackGame').value.trim();
                    const desc = document.getElementById('feedbackDesc').value.trim();
                    const email = document.getElementById('feedbackEmail').value.trim();
                    const resultDiv = document.getElementById('feedbackResult');
                    if (!desc) {
                        resultDiv.innerText = '请填写问题描述';
                        return;
                    }
                    resultDiv.innerText = '✅ 反馈已收到，感谢您的支持！（演示模式）';
                    resultDiv.style.color = 'green';
                    document.getElementById('feedbackGame').value = '';
                    document.getElementById('feedbackDesc').value = '';
                    document.getElementById('feedbackEmail').value = '';
                };
            }
        }
    }

    function copyLinkToClipboard(link) { if(link){ navigator.clipboard.writeText(link); alert('链接已复制'); } }
    function jumpToLink(link) { if(link) window.open(link, '_blank'); }

    function closeAuthModal() { document.getElementById('authModal').classList.remove('show'); }

    function showAuthModal(mode) {
        const modal = document.getElementById('authModal');
        const titleEl = document.getElementById('authModalTitle');
        const container = document.getElementById('authFormContainer');
        if(mode === 'login') {
            titleEl.innerText = '登录账号';
            container.innerHTML = `<div class="form-group"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com"></div><div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="密码"></div><button class="auth-btn" id="submitLoginBtn">登录</button><div class="switch-auth" id="switchToReg">没有账号？ 立即注册</div><div id="authError" class="error-msg"></div>`;
            document.getElementById('submitLoginBtn')?.addEventListener('click', () => { alert('后续敬请期待'); closeAuthModal(); });
            document.getElementById('switchToReg')?.addEventListener('click', () => showAuthModal('register'));
        } else {
            titleEl.innerText = '注册账号';
            container.innerHTML = `<div class="form-group"><label>昵称</label><input type="text" id="regNickname" placeholder="昵称"></div><div class="form-group"><label>邮箱</label><input type="email" id="regEmail" placeholder="your@email.com"></div><div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="密码"></div><button class="auth-btn" id="submitRegBtn">注册</button><div class="switch-auth" id="switchToLogin">已有账号？ 去登录</div><div id="authError" class="error-msg"></div>`;
            document.getElementById('submitRegBtn')?.addEventListener('click', () => { alert('注册成功'); closeAuthModal(); });
            document.getElementById('switchToLogin')?.addEventListener('click', () => showAuthModal('login'));
        }
        modal.classList.add('show');
    }

    async function renderWishModal(page=1) {
        document.getElementById('download-tip').style.display = 'none';
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="loading-spinner"></div>加载愿望...</div>`;
        const result = await fetchWishes(page);
        const wishes = result.data;
        wishCurrentPage = result.page;
        wishTotalPages = result.totalPages;
        wishTotal = result.total;
        let wishItems = '';
        if(!wishes.length) wishItems = '<div class="wish-empty">✨ 还没有愿望，快许下第一个愿望吧</div>';
        else {
            wishes.forEach(w => {
                wishItems += `<div class="wish-item"><div class="wish-text">💬 ${w.text}</div>${w.reply ? `<div class="wish-reply">📢 回复：${w.reply}</div>` : ''}<div class="wish-time">${w.time || ''}</div></div>`;
            });
        }
        const formHtml = `<div class="wish-form"><input class="wish-input" id="newWishInput" placeholder="许下心愿，例如：求星之卡比..."><button class="wish-submit-btn" id="submitWishBtn">✨ 许愿</button></div>`;
        modalBody.innerHTML = `${formHtml}<div class="wish-list">${wishItems}</div>`;
        document.getElementById('submitWishBtn')?.addEventListener('click', async () => {
            const input = document.getElementById('newWishInput');
            const txt = input.value.trim();
            if(txt.length<2) { alert('愿望至少2个字'); return; }
            const res = await createWish(txt);
            if(res.code == 0) { alert('许愿成功！'); input.value=''; await renderWishModal(wishCurrentPage); }
            else alert('许愿失败，请稍后再试');
        });
        document.getElementById('pageInfo').innerText = `第 ${wishCurrentPage}/${wishTotalPages} 页 (共${wishTotal}条)`;
        document.getElementById('prevPage').disabled = wishCurrentPage <= 1;
        document.getElementById('nextPage').disabled = wishCurrentPage >= wishTotalPages;
        document.getElementById('pagination').style.display = 'flex';
    }

    async function handleWishClickWithAuth() {
        if(!currentUser) { alert('请先登录'); showAuthModal('login'); return; }
        currentMode = 'wish';
        document.getElementById('modalTitle').innerHTML = '<span>⛲ 许愿池 · 留下你的愿望</span>';
        openResultModal();
        await renderWishModal(1);
    }

    function loadStoredUser() { currentUser = null; updateAuthUI(); }
    function updateAuthUI() {
        const authArea = document.getElementById('authArea');
        if(currentUser && currentUser.nickname) {
            authArea.innerHTML = `<div><span>😀${currentUser.nickname}</span><button class="logout-btn" id="logoutBtn">退出</button></div>`;
            document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser=null; updateAuthUI(); });
        } else {
            authArea.innerHTML = `<button class="login-btn-header" id="openLoginModalBtn">🔐 登录 / 注册</button>`;
            document.getElementById('openLoginModalBtn')?.addEventListener('click', () => showAuthModal('login'));
        }
    }

    // 今日更新模态框
    async function openUpdateModal() {
        if (!dataLoaded) {
            alert('游戏数据还在加载中，请稍后再试');
            return;
        }
        todayGameList = getTodayUpdatedGames(gameDB);
        todayCurrentPage = 1;
        todayTotalPages = Math.ceil(todayGameList.length / pageSize);
        currentMode = 'today';
        document.getElementById('modalTitle').innerHTML = `📅 今日更新 <span class="result-count">${todayGameList.length}</span>`;
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('download-tip').style.display = 'flex';
        await renderTodayPage(1);
    }

    async function renderTodayPage(page) {
        const modalBody = document.getElementById('modalBody');
        const start = (page-1)*pageSize;
        const end = start + pageSize;
        const pageGames = todayGameList.slice(start, end);
        modalBody.innerHTML = generateTodayCards(pageGames);
        for(let i=0; i<pageGames.length; i++) {
            const game = pageGames[i];
            for(let j=0; j<game.links.length; j++) {
                const container = document.getElementById(`today-qr-${i}-${j}`);
                if(container && game.links[j].url) {
                    await generateQRCode(container, game.links[j].url);
                }
            }
        }
        attachQrZoom();
        document.getElementById('pageInfo').innerText = `第 ${page}/${todayTotalPages} 页 (共${todayGameList.length}个)`;
        document.getElementById('prevPage').disabled = page <= 1;
        document.getElementById('nextPage').disabled = page >= todayTotalPages;
    }

    function generateTodayCards(games) {
        if(!games.length) return '<div class="empty-modal-msg">📭 今日暂无更新</div>';
        let html = '';
        games.forEach((game, idx) => {
            html += `<div class="modal-game-card">
                        <div class="game-title-row">
                            🎮 ${game.name} (${game.platform})
                            <span class="update-date">${game.updateDate}更新</span>
                        </div>
                        <div class="modal-qr-group">`;
            game.links.forEach((link, linkIdx) => {
                html += `<div class="modal-qr-item" data-link="${link.url}" data-platform="${link.name}" data-code="${link.code || ''}">
                            <div class="qr-code-box" id="today-qr-${idx}-${linkIdx}"></div>
                            <span class="qr-label">${link.name}</span>
                         </div>`;
            });
            html += `</div></div>`;
        });
        return html;
    }

        ];
        const container = document.getElementById('bgSlideshow');
        if (!container) return;
        bgImages.forEach((src, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide';
            if (index === 0) slide.classList.add('active');
            slide.style.backgroundImage = `url(${src})`;
            container.appendChild(slide);
        });
        let current = 0;
        const slides = document.querySelectorAll('.bg-slideshow .slide');
        if (slides.length === 0) return;

            slides[current].classList.add('active');
        }, 6000);
    }

    function initMusic() {
        const musicList = [
            'music/1.mp3',
            'music/2.mp3',
            'music/3.mp3',
            'music/4.mp3',
            'music/5.mp3'
        ];
        let currentIndex = 0;
        const audio = new Audio();
        audio.id = 'bgMusic';
        audio.volume = 0.4;
        audio.preload = 'auto';
        function playNext() {
            const src = musicList[currentIndex];
            audio.src = src;
            audio.load();
            audio.play().catch(e => {
                console.warn(`播放失败 (${src})，尝试下一首`, e);
                currentIndex = (currentIndex + 1) % musicList.length;
                setTimeout(playNext, 500);
            });
        }
        audio.addEventListener('ended', () => {
            currentIndex = (currentIndex + 1) % musicList.length;
            playNext();
        });
        audio.addEventListener('error', () => {
            console.warn(`加载错误: ${audio.src}，跳过`);
            currentIndex = (currentIndex + 1) % musicList.length;
            playNext();
        });
        const startMusic = () => {
            playNext();
            document.removeEventListener('click', startMusic);
            document.removeEventListener('touchstart', startMusic);
        };
        document.addEventListener('click', startMusic);
        document.addEventListener('touchstart', startMusic);
    }

    function bindEvents() {
        document.getElementById('searchBtn').addEventListener('click', handleSearch);
        document.getElementById('closeModalBtn').addEventListener('click', closeResultModal);
        document.getElementById('closeAuthModalBtn').addEventListener('click', closeAuthModal);
        document.getElementById('closeZoomBtn').addEventListener('click', closeZoom);
        document.getElementById('prevPage').addEventListener('click', handlePrevPage);
        document.getElementById('nextPage').addEventListener('click', handleNextPage);
        document.getElementById('jumpDirectBtn')?.addEventListener('click', () => jumpToLink(window.currentZoomLink));
        document.getElementById('copyDirectBtn')?.addEventListener('click', () => copyLinkToClipboard(window.currentZoomLink));
        document.getElementById('wishingWellBtn').addEventListener('click', handleWishClickWithAuth);
        for (const [btnId, config] of Object.entries(toolButtons)) {
            const btn = document.getElementById(btnId);
            if (btn) btn.onclick = () => openToolModal(config.title, config.content);
        }
        document.querySelectorAll('.mock-link').forEach(el => {
            el.addEventListener('click', () => {
                const keyword = el.innerText.trim();
                if (keyword) searchByKeyword(keyword);
            });
        });
        document.getElementById('todayUpdateBtn').addEventListener('click', openUpdateModal);
        const searchInput = document.getElementById('gameSearchInput');
        if (searchInput) {
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('searchBtn').click();
                }
            });
        }
    }

    // 初始化
    loadStoredUser();
    bindEvents();
    loadGameData();
    initSlideshow();
    initMusic();
</script>
